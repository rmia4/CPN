<div xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     th:fragment="header">
    <!-- HEADER START -->
    <header
            class="fixed top-0 right-0 left-0 z-50 bg-transparent"
            role="navigation"
            aria-label="Main navigation"
    >
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 items-center justify-between md:h-18">
                
                <!-- Logo -->
                <a
                        class="relative z-50 flex items-center gap-2 text-xl font-extrabold"
                        aria-label="cpn.page home"
                        href="/"
                >
            <span class="text-neutral-950">
              CPN
            </span>
                </a>

                <!-- user status -->
                <div class="flex flex-1 justify-center px-4">
                    <a sec:authorize="isAnonymous()"
                            href="/login"
                            class="inline-flex items-center justify-center px-4 py-2 min-w-[88px] text-sm font-semibold text-white
              bg-neutral-950 hover:bg-neutral-800 active:scale-95 transition-colors duration-150 rounded-lg">login</a>
                    <div sec:authorize="isAuthenticated()" class="flex items-center gap-2">
                        <span
                                sec:authentication="principal.userModel.userName"
                                class="max-w-[120px] truncate text-sm font-semibold text-neutral-800"></span>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button
                                    type="submit"
                                    class="inline-flex items-center justify-center px-4 py-2 min-w-[88px] text-sm font-semibold text-white
                      bg-neutral-950 hover:bg-neutral-800 active:scale-95 transition-colors duration-150 rounded-lg">
                                logout
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Desktop Nav (lg 이상에서 활성화) -->
                <nav class="hidden lg:!flex lg:items-center lg:gap-1">
                    <button type="button" onclick="toggleDarkMode()" class="h-9 w-9 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-700">
                        <span class="themeIcon">🌙</span>
                    </button>
                    <a href="/test/model/mapPin"
                       class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg transition duration-150">
                        지도
                    </a>

                    <a href="/timetable"
                       class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg transition duration-150">
                        시간표
                    </a>

                    <a href="/post/list"
                       class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg transition duration-150">
                        게시판
                    </a>

                    <a href="/grok"
                       class="inline-flex items-center px-3 py-1.5 text-sm font-medium text-white
                           rounded-full
                           bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500
                           bg-[length:200%_200%]
                           transition-all duration-300 ease-out
                           hover:animate-gradientFlow
                           hover:scale-125 hover:-translate-y-1
                           shadow-md hover:shadow-[0_0_25px_rgba(168,85,247,0.8)]">🚀 AI</a>
                </nav>
                
                <!-- Language Switcher (md 이상에서만 표시) -->
                <div class="hidden md:flex md:items-center md:gap-8">
                    <!-- Language Switcher -->
                    <div
                            class="relative inline-flex items-center p-1 bg-neutral-100 rounded-full"
                            role="radiogroup"
                            aria-label="Language"
                    >
                        <button
                                class="relative z-10 flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium
                text-neutral-500 hover:text-neutral-900 transition-colors duration-200 rounded-full"
                               role="radio"
                               aria-checked="false"
                               aria-label="English"
                        >
                            <a href="#en">
                               <span>🇺🇸</span>
                               <span>EN</span>
                            </a>
                        </button>
                        <button
                                class="relative z-10 flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium
                text-white bg-neutral-950 transition-colors duration-200 rounded-full"
                                role="radio"
                                aria-checked="true"
                                aria-label="한국어"
                        >
                            <span>🇰🇷</span>
                            <span>한국어</span>
                        </button>
                    </div>
                </div>
                
                <!-- Mobile Button (모바일에서만 표시) -->
                <button
                        id="menuBtn"
                        type="button"
                        class="md:hidden flex h-10 w-10 items-center justify-center text-neutral-700
            bg-transparent hover:bg-neutral-100 transition-colors rounded-lg"
                        aria-expanded="false"
                        aria-label="메뉴 열기"
                >
                    <div class="flex flex-col items-center w-5 gap-[5px]">
              <span
                      class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
                        <span
                                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
                        ></span>
                        <span
                                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
                        ></span>
                    </div>
                </button>
            </div>
        </div>
        
        <!-- Mobile Menu (전체 뷰를 덮는 오버레이) -->
        <div
                id="mobileMenu"
                class="fixed inset-0 z-40 md:hidden bg-white opacity-0 translate-y-6
        pointer-events-none transition-opacity transition-transform duration-400 ease-out">
            <div class="flex flex-col h-full pt-20 px-6 pb-8">
                <!-- Mobile Nav -->
                <nav id="mobileNavLinks" class="flex flex-col gap-1">
                    <a href="/test/model/mapPin"
                       class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl transition duration-150">
                        지도
                    </a>

                    <a href="/timetable"
                       class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl transition duration-150">
                        시간표
                    </a>

                    <a href="/post/list"
                       class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl transition duration-150">
                        게시판
                    </a>

                    <a href="/grok"
                       class="inline-flex items-center px-3 py-1.5 text-sm font-medium text-white
                           rounded-full
                           bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500
                           bg-[length:200%_200%]
                           transition-all duration-300 ease-out
                           hover:animate-gradientFlow
                           hover:scale-105 hover:-translate-y-1
                           shadow-md hover:shadow-[0_0_25px_rgba(168,85,247,0.8)]">🚀 인공지능</a>
                </nav>
                <div class="flex flex-col mt-auto gap-4">
                    <button
                            type="button"
                            onclick="toggleDarkMode()"
                            class="flex items-center justify-center px-6 py-3 text-base font-semibold border border-neutral-200 text-neutral-800 hover:bg-neutral-100 transition-colors duration-150 rounded-lg"
                    >
                        <span class="themeIcon">🌙</span>
                    </button>
                    <div class="flex justify-center gap-3">
                        <!-- Language Switcher -->
                        <div
                                class="relative inline-flex items-center p-1 bg-neutral-100 rounded-full"
                                role="radiogroup"
                                aria-label="Language"
                        >
                            <button
                                    class="relative z-10 flex items-center px-3 py-1.5 gap-1.5 text-sm font-medium
                  text-neutral-600 hover:text-neutral-900 transition-colors duration-200 rounded-full"
                                    role="radio"
                                    aria-checked="false"
                                    aria-label="English"
                            >
                                <a href="#en">
                                    <span>🇺🇸</span>
                                    <span>EN</span>
                                </a>
                            </button>
                            <button
                                    class="relative z-10 flex items-center px-3 py-1.5 gap-1.5
                  text-sm font-medium text-white bg-neutral-950 rounded-full"
                                    role="radio"
                                    aria-checked="true"
                                    aria-label="한국어"
                            >
                                <span>🇰🇷</span>
                                <span>한국어</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- JS는 메뉴 토글만 유지 -->
    <script>
        function initMenu() {
            const btn = document.getElementById("menuBtn");
            const menu = document.getElementById("mobileMenu");
            const spans = btn.querySelectorAll("span");

            btn.addEventListener("click", () => {
                menu.classList.toggle("opacity-0");
                menu.classList.toggle("pointer-events-none");
                menu.classList.toggle("translate-y-6");

                spans[0].classList.toggle("translate-y-[7px]");
                spans[0].classList.toggle("rotate-45");
                spans[1].classList.toggle("opacity-0");
                spans[2].classList.toggle("-translate-y-[7px]");
                spans[2].classList.toggle("-rotate-45");

                const expanded = btn.getAttribute("aria-expanded") === "true";

                btn.setAttribute("aria-expanded", !expanded);
                btn.setAttribute("aria-label", expanded ? "메뉴 열기" : "메뉴 닫기");

            });
        }

        initMenu();
    </script>
</div>
