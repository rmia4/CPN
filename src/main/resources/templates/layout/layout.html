<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#262626" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/dummyImages/ks.svg" type="image/svg+xml" />
    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            keyframes: {
              gradientFlow: {
                '0%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
                '100%': { backgroundPosition: '0% 50%' },
              },
            },
            animation: {
              gradientFlow: 'gradientFlow 3s ease infinite',
            },
          },
        },
      }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>CPN layout</title>
    <style>
      html.dark body,
      html.dark .bg-white {
        background-color: #262626 !important;
      }

      html.dark body,
      html.dark .text-black,
      html.dark .text-neutral-950,
      html.dark .text-neutral-900,
      html.dark .text-neutral-800,
      html.dark .text-neutral-700,
      html.dark .text-neutral-600,
      html.dark .text-neutral-500 {
        color: #f5f5f5 !important;
      }

      html.dark .bg-neutral-100,
      html.dark .bg-neutral-200 {
        background-color: #404040 !important;
      }

      html.dark .border,
      html.dark .border-neutral-200,
      html.dark .border-gray-200 {
        border-color: #525252 !important;
      }

      html.dark input,
      html.dark textarea,
      html.dark select {
        background-color: #262626 !important;
        color: #f5f5f5 !important;
        border-color: #525252 !important;
      }

      #pageLoadingBar {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        width: 100%;
        height: 3px;
        overflow: hidden;
        pointer-events: none;
        opacity: 0;
        transition: opacity 150ms ease;
      }

      #pageLoadingBar::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 42%;
        height: 100%;
        background: linear-gradient(90deg, #171717, #737373);
        transform: translateX(-110%);
      }

      html.dark #pageLoadingBar::before {
        background: linear-gradient(90deg, #f5f5f5, #a3a3a3);
      }

      html.is-page-loading #pageLoadingBar {
        opacity: 1;
      }

      html.is-page-loading #pageLoadingBar::before {
        animation: pageLoadingSlide 900ms ease-in-out infinite;
      }

      @keyframes pageLoadingSlide {
        0% {
          transform: translateX(-110%);
        }
        55% {
          transform: translateX(80%);
        }
        100% {
          transform: translateX(245%);
        }
      }
    </style>
    <script>
      function toggleDarkMode() {
        const root = document.documentElement;

        root.classList.toggle("dark");

        if (root.classList.contains("dark")) {
          localStorage.setItem("theme", "dark");
          updateThemeIcons("⭐");
        } else {
          localStorage.setItem("theme", "light");
          updateThemeIcons("🌙");
        }
      }

      function updateThemeIcons(iconText) {
        document.querySelectorAll(".themeIcon").forEach((icon) => {
          icon.textContent = iconText;
        });
      }

      // 페이지 로드시 아이콘도 맞춰줌
      window.addEventListener("DOMContentLoaded", () => {
        const theme = localStorage.getItem("theme");

        if (theme === "dark") {
          document.documentElement.classList.add("dark");
          updateThemeIcons("⭐");
        } else {
          document.documentElement.classList.remove("dark");
          updateThemeIcons("🌙");
        }

        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("/service-worker.js");
        }
      });

      (() => {
        const loadingClass = "is-page-loading";
        const locationPattern = /\b(?:window\.)?location(?:\.href|\.assign|\.replace)?\b/;

        function showPageLoading() {
          document.documentElement.classList.add(loadingClass);
        }

        function hidePageLoading() {
          document.documentElement.classList.remove(loadingClass);
        }

        function isModifiedClick(event) {
          return event.defaultPrevented
              || event.button !== 0
              || event.metaKey
              || event.ctrlKey
              || event.shiftKey
              || event.altKey;
        }

        function isSamePageAnchor(url) {
          return url.origin === window.location.origin
              && url.pathname === window.location.pathname
              && url.search === window.location.search
              && url.hash;
        }

        function shouldSkipLink(anchor, event) {
          if (!anchor || isModifiedClick(event) || anchor.hasAttribute("download")) return true;

          const target = (anchor.getAttribute("target") || "").toLowerCase();
          if (target && target !== "_self") return true;

          const href = anchor.getAttribute("href") || "";
          if (!href || href.trim().startsWith("#")) return true;

          try {
            const url = new URL(anchor.href, window.location.href);
            return !["http:", "https:"].includes(url.protocol) || isSamePageAnchor(url);
          } catch (error) {
            return true;
          }
        }

        function shouldSkipForm(form) {
          if (!form || form.method?.toLowerCase() === "dialog") return true;

          const target = (form.getAttribute("target") || "").toLowerCase();
          if (target && target !== "_self") return true;

          try {
            const url = new URL(form.action || window.location.href, window.location.href);
            return !["http:", "https:"].includes(url.protocol) || isSamePageAnchor(url);
          } catch (error) {
            return true;
          }
        }

        document.addEventListener("click", (event) => {
          const anchor = event.target.closest?.("a[href]");
          if (anchor) {
            window.setTimeout(() => {
              if (!shouldSkipLink(anchor, event)) showPageLoading();
            }, 0);
            return;
          }

          const button = event.target.closest?.("button, input[type='button'], input[type='submit']");
          if (!button || button.disabled || button.closest("form")) return;

          const inlineHandler = button.getAttribute("onclick") || "";
          window.setTimeout(() => {
            if (!event.defaultPrevented && locationPattern.test(inlineHandler)) {
              showPageLoading();
            }
          }, 0);
        });

        document.addEventListener("submit", (event) => {
          const form = event.target;
          window.setTimeout(() => {
            if (!event.defaultPrevented && !shouldSkipForm(form)) {
              showPageLoading();
            }
          }, 0);
        });

        const nativeFormSubmit = HTMLFormElement.prototype.submit;
        HTMLFormElement.prototype.submit = function () {
          if (!shouldSkipForm(this)) {
            showPageLoading();
          }

          nativeFormSubmit.call(this);
        };

        window.addEventListener("beforeunload", showPageLoading);
        window.addEventListener("pageshow", hidePageLoading);
        window.addEventListener("DOMContentLoaded", hidePageLoading);
      })();
    </script>
  </head>
  <body class="bg-white text-black
             dark:bg-neutral-800 dark:text-neutral-100 flex flex-col min-h-screen">
    <div id="pageLoadingBar" aria-hidden="true"></div>

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>



    <!-- Content -->
    <div class="pt-16 md:pt-18">
      <div th:replace="${content}"></div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
  </body>
</html>
