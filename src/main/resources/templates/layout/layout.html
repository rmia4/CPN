<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class'
      }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>CPN layout</title>
    <style>
      html.dark body,
      html.dark .bg-white {
        background-color: #262626 !important;
      }

      html.dark body,
      html.dark .text-black,
      html.dark .text-neutral-950,
      html.dark .text-neutral-900,
      html.dark .text-neutral-800,
      html.dark .text-neutral-700,
      html.dark .text-neutral-600,
      html.dark .text-neutral-500 {
        color: #f5f5f5 !important;
      }

      html.dark .bg-neutral-100,
      html.dark .bg-neutral-200 {
        background-color: #404040 !important;
      }

      html.dark .border,
      html.dark .border-neutral-200,
      html.dark .border-gray-200 {
        border-color: #525252 !important;
      }

      html.dark input,
      html.dark textarea,
      html.dark select {
        background-color: #262626 !important;
        color: #f5f5f5 !important;
        border-color: #525252 !important;
      }
    </style>
    <script>
      function toggleDarkMode() {
        const root = document.documentElement;

        root.classList.toggle("dark");

        if (root.classList.contains("dark")) {
          localStorage.setItem("theme", "dark");
          updateThemeIcons("⭐");
        } else {
          localStorage.setItem("theme", "light");
          updateThemeIcons("🌙");
        }
      }

      function updateThemeIcons(iconText) {
        document.querySelectorAll(".themeIcon").forEach((icon) => {
          icon.textContent = iconText;
        });
      }

      // 페이지 로드시 아이콘도 맞춰줌
      window.addEventListener("DOMContentLoaded", () => {
        const theme = localStorage.getItem("theme");

        if (theme === "dark") {
          document.documentElement.classList.add("dark");
          updateThemeIcons("⭐");
        } else {
          document.documentElement.classList.remove("dark");
          updateThemeIcons("🌙");
        }
      });
    </script>
  </head>
  <body class="bg-white text-black
             dark:bg-neutral-800 dark:text-neutral-100 flex flex-col min-h-screen">
    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>



    <!-- Content -->
    <div class="pt-16 md:pt-18">
      <div th:replace="${content}"></div>
    </div>
    <a href="/test/model/modelTest">modelTest 여기서 user Model 부분 바로 POST 전송 누르고 테스트하심 됩니/a></a>
    <br>
    <a href="/post/list">Post list page</a>
    <a href="/test/model/mapPin">Map test</a>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
  </body>
</html>
