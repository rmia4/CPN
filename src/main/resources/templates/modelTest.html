<html lang="ko" xmlns:th="http://thymeleaf.org">
<!doctype html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>

<body>
<header>
    <h2>modelTest.html</h2>
    <hr>

</header>

<main>
    <h3>user Model</h3>
    <form action="/userModelTest" method="post">
        <label for="userId">아이디:</label>
        <input type="text" id="userId" name="userId" required><br>
        <label for="userName">이름:</label>
        <input type="text" id="userName" name="userName" required><br>
        <label for="userNumber">number:</label>
        <input type="text" id="userNumber" name="userNumber" required><br>

        <button type="submit">POST 전송</button>
    </form>
    <form action="/modelTest/search" method="get">
        <input type="hidden" name="modelType" value="user">
        <button type="submit">조회</button>
    </form>

    <h3>MapPin Model</h3>
    <form action="/mapPinModelTest" method="post">
        <label for="lon">lon:</label>
        <input type="number" step="any" id="lon" name="lon" required><br>
        <label for="lat">lat:</label>
        <input type="number" step="any" id="lat" name="lat" required><br>
        <label for="title">title:</label>
        <input type="text" id="title" name="title" required><br>
        <label for="description">description:</label>
        <input type="text" id="description" name="description" required><br>

        <button type="submit">POST 전송</button>
    </form>
        <form action="/modelTest/search" method="get">
            <input type="hidden" name="modelType" value="mapPin">
            <button type="submit">조회</button>
        </form>

    <h3>Notification Model</h3>
    <form action="/notificationModelTest" method="post">
        <label for="userId">userId:</label>
        <input type="text" id="userId" name="userId" required><br>
        <label for="description">description:</label>
        <input type="text" id="description" name="description" required><br>

        <button type="submit">POST 전송</button>
    </form>
    <form action="/modelTest/search" method="get">
        <input type="hidden" name="modelType" value="notification">
        <button type="submit">조회</button>
    </form>


</main>


</body>
</html>
