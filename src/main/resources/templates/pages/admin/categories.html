<div th:replace="~{layout/layout :: layout(~{::content})}">
    <div th:fragment="content">
        <main class="mx-auto max-w-5xl px-4 py-8">
            <section class="mb-6">
                <a href="/admin" class="text-sm text-neutral-500 hover:underline">관리자 목록으로</a>
                <h1 class="mt-3 text-2xl font-bold text-neutral-950 dark:text-neutral-100">게시글 카테고리 관리</h1>
                <p class="mt-2 text-sm text-neutral-500 dark:text-neutral-300">
                    게시글 작성 시 사용할 카테고리를 추가하고, 사용 중이지 않은 카테고리를 수정하거나 삭제할 수 있습니다.
                </p>
            </section>

            <section class="mb-6 border border-neutral-200 bg-white p-5 dark:border-neutral-700 dark:bg-neutral-800">
                <h2 class="mb-3 text-sm font-semibold">카테고리 추가</h2>
                <p th:if="${categoryError}" th:text="${categoryError}" class="mb-3 border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600"></p>
                <form th:action="@{/admin/categories/add}" method="post" class="flex flex-col gap-2 sm:flex-row">
                    <input type="text"
                           name="categoryName"
                           class="flex-1 border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100"
                           placeholder="새 카테고리 이름"
                           required>
                    <button type="submit"
                            class="px-4 py-2 text-sm font-semibold text-white bg-neutral-950 hover:bg-neutral-800">
                        추가
                    </button>
                </form>
            </section>

            <section class="border border-neutral-200 bg-white dark:border-neutral-700 dark:bg-neutral-800">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[640px] text-sm">
                        <thead class="border-b border-neutral-200 bg-neutral-100 text-left text-neutral-600 dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-300">
                        <tr>
                            <th class="px-4 py-3 font-semibold">ID</th>
                            <th class="px-4 py-3 font-semibold">카테고리명</th>
                            <th class="px-4 py-3 font-semibold">연결 게시글 수</th>
                            <th class="px-4 py-3 font-semibold text-right">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${categoryList == null or #lists.isEmpty(categoryList)}">
                            <td colspan="4" class="px-4 py-8 text-center text-neutral-500">등록된 카테고리가 없습니다.</td>
                        </tr>
                        <tr th:each="category : ${categoryList}" class="border-b border-neutral-100 dark:border-neutral-700">
                            <td class="px-4 py-3" th:text="${category.id}">1</td>
                            <td class="px-4 py-3 font-semibold" th:text="${category.categoryName}">분실물</td>
                            <td class="px-4 py-3" th:text="${adminService.countPostsByCategory(category.id)}">0</td>
                            <td class="px-4 py-3 text-right">
                                <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}"
                                   class="mr-2 inline-flex items-center justify-center rounded border border-neutral-300 px-3 py-1.5 text-xs font-semibold hover:bg-neutral-100 dark:border-neutral-600 dark:hover:bg-neutral-700">
                                    수정
                                </a>
                                <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}"
                                      method="post"
                                      class="inline"
                                      onsubmit="return confirm('이 카테고리를 삭제할까요?');">
                                    <button type="submit"
                                            class="inline-flex items-center justify-center rounded border border-red-200 bg-red-50 px-3 py-1.5 text-xs font-semibold text-red-600 hover:bg-red-100 dark:border-red-900 dark:bg-red-950 dark:text-red-300 dark:hover:bg-red-900">
                                        삭제
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
