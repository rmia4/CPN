<div th:replace="~{layout/layout :: layout(~{::content})}">
    <div th:fragment="content">
        <main class="mx-auto max-w-2xl px-4 py-8">
            <section class="mb-6">
                <a href="/admin/categories" class="text-sm text-neutral-500 hover:underline">카테고리 목록으로</a>
                <h1 class="mt-3 text-2xl font-bold text-neutral-950 dark:text-neutral-100">카테고리 수정</h1>
                <p class="mt-2 text-sm text-neutral-500 dark:text-neutral-300">
                    연결된 게시글이 없는 카테고리만 이름을 수정할 수 있습니다.
                </p>
            </section>

            <section class="border border-neutral-200 bg-white p-5 dark:border-neutral-700 dark:bg-neutral-800">
                <p th:if="${categoryError}" th:text="${categoryError}" class="mb-3 border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600"></p>

                <div class="mb-5 grid gap-3 text-sm sm:grid-cols-2">
                    <div class="border border-neutral-200 p-3 dark:border-neutral-700 dark:bg-neutral-900">
                        <p class="text-xs text-neutral-500 dark:text-neutral-300">카테고리 ID</p>
                        <p class="mt-1 font-semibold text-neutral-900 dark:text-neutral-100" th:text="${category.id}">1</p>
                    </div>
                    <div class="border border-neutral-200 p-3 dark:border-neutral-700 dark:bg-neutral-900">
                        <p class="text-xs text-neutral-500 dark:text-neutral-300">연결 게시글 수</p>
                        <p class="mt-1 font-semibold text-neutral-900 dark:text-neutral-100" th:text="${postCount}">0</p>
                    </div>
                </div>

                <form th:action="@{/admin/categories/{id}/edit(id=${category.id})}" method="post" class="space-y-4">
                    <div>
                        <label for="categoryName" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">카테고리명</label>
                        <input id="categoryName"
                               type="text"
                               name="categoryName"
                               th:value="${category.categoryName}"
                               th:readonly="${postCount > 0}"
                               class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100"
                               required>
                    </div>

                    <div th:if="${postCount > 0}" class="text-sm text-neutral-500">
                        이 카테고리를 사용하는 게시글이 있어 이름을 수정할 수 없습니다.
                    </div>

                    <div class="flex justify-end gap-2 border-t border-neutral-200 pt-4 dark:border-neutral-700">
                        <a href="/admin/categories"
                           class="inline-flex items-center justify-center border border-neutral-300 px-4 py-2 text-sm font-semibold hover:bg-neutral-100 dark:border-neutral-600 dark:hover:bg-neutral-700">
                            취소
                        </a>
                        <button type="submit"
                                th:disabled="${postCount > 0}"
                                class="px-4 py-2 text-sm font-semibold text-white bg-neutral-950 hover:bg-neutral-800 disabled:cursor-not-allowed disabled:bg-neutral-400">
                            저장
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</div>
