<div th:replace="~{layout/layout :: layout(~{::content})}">
    <div th:fragment="content">
        <main class="mx-auto max-w-3xl px-4 py-8">
            <section class="mb-6">
                <a href="/admin" class="text-sm text-neutral-500 hover:underline">관리자 목록으로</a>
                <h1 class="mt-3 text-2xl font-bold text-neutral-950 dark:text-neutral-100">사용자 정보 수정</h1>
                <p class="mt-2 text-sm text-neutral-500 dark:text-neutral-300">
                    관리자 권한으로 계정의 기본 정보, 권한, 비밀번호, 선호 스타일을 수정합니다.
                </p>
            </section>

            <section class="border border-neutral-200 bg-white p-5 dark:border-neutral-700 dark:bg-neutral-800">
                <div class="mb-5 grid gap-3 text-sm sm:grid-cols-2">
                    <div class="border border-neutral-200 p-3 dark:border-neutral-700 dark:bg-neutral-900">
                        <p class="text-xs text-neutral-500 dark:text-neutral-300">DB ID</p>
                        <p class="mt-1 font-semibold text-neutral-900 dark:text-neutral-100" th:text="${user.id}">1</p>
                    </div>
                    <div class="border border-neutral-200 p-3 dark:border-neutral-700 dark:bg-neutral-900">
                        <p class="text-xs text-neutral-500 dark:text-neutral-300">현재 아이디</p>
                        <p class="mt-1 font-semibold text-neutral-900 dark:text-neutral-100" th:text="${user.userId}">user01</p>
                    </div>
                </div>

                <form th:action="@{/admin/users/{id}/edit(id=${user.id})}"
                      th:object="${adminUserUpdateRequestDto}"
                      method="post"
                      class="space-y-4">
                    <div th:if="${#fields.hasGlobalErrors()}" class="border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600">
                        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                    </div>

                    <div class="grid gap-3 sm:grid-cols-2">
                        <div>
                            <label for="userId" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">아이디</label>
                            <input id="userId" type="text" th:field="*{userId}"
                                   class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100" required>
                            <p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="mt-1 text-xs text-red-500"></p>
                        </div>
                        <div>
                            <label for="userName" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">이름</label>
                            <input id="userName" type="text" th:field="*{userName}"
                                   class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100" required>
                            <p th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="mt-1 text-xs text-red-500"></p>
                        </div>
                    </div>

                    <div class="grid gap-3 sm:grid-cols-2">
                        <div>
                            <label for="userNumber" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">학번</label>
                            <input id="userNumber" type="text" th:field="*{userNumber}"
                                   class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100" required>
                            <p th:if="${#fields.hasErrors('userNumber')}" th:errors="*{userNumber}" class="mt-1 text-xs text-red-500"></p>
                        </div>
                        <div>
                            <label for="role" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">권한</label>
                            <select id="role" th:field="*{role}"
                                    class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100" required>
                                <option value="ROLE_USER">ROLE_USER</option>
                                <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                            </select>
                            <p th:if="${#fields.hasErrors('role')}" th:errors="*{role}" class="mt-1 text-xs text-red-500"></p>
                        </div>
                    </div>

                    <div class="grid gap-3 sm:grid-cols-2">
                        <div>
                            <label for="gender" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">성별</label>
                            <select id="gender" th:field="*{gender}"
                                    class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100">
                                <option value="">선택 안 함</option>
                                <option value="남성">남성</option>
                                <option value="여성">여성</option>
                                <option value="기타">기타</option>
                            </select>
                        </div>
                        <div>
                            <label for="mannerPoint" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">매너점수</label>
                            <input id="mannerPoint" type="number" step="0.1" th:field="*{mannerPoint}"
                                   class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100">
                        </div>
                    </div>

                    <div>
                        <label for="passwd" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">새 비밀번호</label>
                        <input id="passwd" type="password" th:field="*{passwd}"
                               class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100"
                               placeholder="변경하지 않으려면 비워두세요">
                    </div>

                    <div class="grid gap-3 sm:grid-cols-3">
                        <div>
                            <label for="style1" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">스타일 1</label>
                            <input id="style1" type="text" th:field="*{style1}"
                                   class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100">
                        </div>
                        <div>
                            <label for="style2" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">스타일 2</label>
                            <input id="style2" type="text" th:field="*{style2}"
                                   class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100">
                        </div>
                        <div>
                            <label for="style3" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">스타일 3</label>
                            <input id="style3" type="text" th:field="*{style3}"
                                   class="w-full border border-neutral-200 px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100">
                        </div>
                    </div>

                    <div class="flex justify-end gap-2 border-t border-neutral-200 pt-4 dark:border-neutral-700">
                        <a th:href="@{/admin/users/{id}/posts(id=${user.id})}"
                           class="inline-flex items-center justify-center border border-neutral-300 px-4 py-2 text-sm font-semibold hover:bg-neutral-100 dark:border-neutral-600 dark:hover:bg-neutral-700">
                            게시글 보기
                        </a>
                        <a href="/admin"
                           class="inline-flex items-center justify-center border border-neutral-300 px-4 py-2 text-sm font-semibold hover:bg-neutral-100 dark:border-neutral-600 dark:hover:bg-neutral-700">
                            취소
                        </a>
                        <button type="submit"
                                class="px-4 py-2 text-sm font-semibold text-white bg-neutral-950 hover:bg-neutral-800">
                            저장
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</div>
