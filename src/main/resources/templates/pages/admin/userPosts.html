<div th:replace="~{layout/layout :: layout(~{::content})}">
    <div th:fragment="content">
        <main class="mx-auto max-w-6xl px-4 py-8">
            <section class="mb-6">
                <a href="/admin" class="text-sm text-neutral-500 hover:underline">관리자 목록으로</a>
                <div class="mt-3 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
                    <div>
                        <p class="text-sm font-semibold text-neutral-500">Admin</p>
                        <h1 class="mt-1 text-2xl font-bold text-neutral-950 dark:text-neutral-100">사용자 작성 게시글</h1>
                        <p class="mt-2 text-sm text-neutral-500 dark:text-neutral-300">
                            <span class="font-semibold" th:text="${user.userName}">사용자</span>
                            <span th:text="|(${user.userId})|">(user01)</span>
                            님이 작성한 게시글을 확인하고 삭제할 수 있습니다.
                        </p>
                    </div>
                    <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                       class="inline-flex items-center justify-center border border-neutral-300 px-4 py-2 text-sm font-semibold hover:bg-neutral-100 dark:border-neutral-600 dark:hover:bg-neutral-700">
                        사용자 정보 수정
                    </a>
                </div>
            </section>

            <section class="border border-neutral-200 bg-white dark:border-neutral-700 dark:bg-neutral-800">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[820px] text-sm">
                        <thead class="border-b border-neutral-200 bg-neutral-100 text-left text-neutral-600 dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-300">
                        <tr>
                            <th class="px-4 py-3 font-semibold">ID</th>
                            <th class="px-4 py-3 font-semibold">제목</th>
                            <th class="px-4 py-3 font-semibold">카테고리</th>
                            <th class="px-4 py-3 font-semibold">작성일</th>
                            <th class="px-4 py-3 font-semibold">위치</th>
                            <th class="px-4 py-3 font-semibold text-right">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${postList == null or #lists.isEmpty(postList)}">
                            <td colspan="6" class="px-4 py-8 text-center text-neutral-500">작성한 게시글이 없습니다.</td>
                        </tr>
                        <tr th:each="post : ${postList}" class="border-b border-neutral-100 dark:border-neutral-700">
                            <td class="px-4 py-3" th:text="${post.id}">1</td>
                            <td class="px-4 py-3">
                                <a class="font-semibold" th:text="${post.title}" th:href="@{/post/detail/{id}(id=${post.id})}">게시글 제목</a>
                                <p class="mt-1 max-w-md truncate text-xs text-neutral-500" th:text="${post.content}">내용</p>
                            </td>
                            <td class="px-4 py-3" th:text="${post.category != null ? post.category.categoryName : '-'}">카테고리</td>
                            <td class="px-4 py-3" th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy.MM.dd HH:mm') : '-'}">2026.05.18</td>
                            <td class="px-4 py-3">
                                <span th:if="${post.lat != null and post.lon != null}" th:text="|${post.lat}, ${post.lon}|">35.1, 129.0</span>
                                <span th:unless="${post.lat != null and post.lon != null}">-</span>
                            </td>
                            <td class="px-4 py-3 text-right">
                                <form th:action="@{/admin/users/{userId}/posts/{postId}/delete(userId=${user.id}, postId=${post.id})}"
                                      method="post"
                                      class="inline"
                                      onsubmit="return confirm('이 게시글을 삭제할까요?');">
                                    <button type="submit"
                                            class="inline-flex items-center justify-center rounded border border-red-200 bg-red-50 px-3 py-1.5 text-xs font-semibold text-red-600 hover:bg-red-100 dark:border-red-900 dark:bg-red-950 dark:text-red-300 dark:hover:bg-red-900">
                                        삭제
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
