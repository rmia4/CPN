<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CPN 소개</title>
</head>
<body class="bg-white dark:bg-neutral-800 dark:border-neutral-700 font-sans min-h-screen flex items-center justify-center px-4">


<!-- 로그인 영역 -->
<div class="w-full max-w-md">

    <!-- 타이틀 -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold tracking-tight">
            <span class="text-blue-500">CDN</span>
        </h1>
        <p class="mt-2 text-neutral-500 text-sm">
            지역기반 캠퍼스 물품 대여 친구
        </p>
    </div>

    <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden">
        <div class="flex border-b border-neutral-200">
            <button id="tab-login"
                    type="button"
                    class="flex-1 py-3 text-sm font-medium border-b-2 border-black">
                로그인
            </button>
            <button id="tab-signup"
                    type="button"
                    class="flex-1 py-3 text-sm font-medium text-neutral-400">
                회원가입
            </button>
        </div>

        <div id="form-wrapper"
             class="transition-all duration-300 ease-in-out min-h-[300px] md:min-h-[250px]">

            <form id="form-login" class="p-6 space-y-4" th:action="@{/login}" method="post">
                <p th:if="${param.error}" class="text-sm text-red-500">아이디 또는 비밀번호를 확인해주세요.</p>
                <p th:if="${param.signupSuccess}" class="text-sm text-green-600">회원가입이 완료되었습니다. 로그인해주세요.</p>

                <div>
                    <label for="login-userId" class="block text-sm font-medium mb-1">아이디</label>
                    <input type="text" id="login-userId" name="userId" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg" required>
                </div>

                <div>
                    <label for="login-passwd" class="block text-sm font-medium mb-1">비밀번호</label>
                    <input type="password" id="login-passwd" name="passwd" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg" required>
                </div>

                <button class="w-full py-2.5 bg-neutral-950 text-white rounded-lg">
                    로그인
                </button>
            </form>

            <form id="form-signup" class="p-6 space-y-4 hidden" th:action="@{/user/add}" th:object="${userSaveRequestDto}" method="post">
                <div>
                    <label for="signup-userId" class="block text-sm font-medium mb-1">아이디</label>
                    <input type="text" id="signup-userId" th:field="*{userId}" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg" required>
                    <p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="mt-1 text-xs text-red-500"></p>
                </div>

                <div>
                    <label for="signup-userName" class="block text-sm font-medium mb-1">이름</label>
                    <input type="text" id="signup-userName" th:field="*{userName}" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg" required>
                    <p th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="mt-1 text-xs text-red-500"></p>
                </div>

                <div>
                    <label for="signup-userNumber" class="block text-sm font-medium mb-1">학번</label>
                    <input type="text" id="signup-userNumber" th:field="*{userNumber}" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg" required>
                    <p th:if="${#fields.hasErrors('userNumber')}" th:errors="*{userNumber}" class="mt-1 text-xs text-red-500"></p>
                </div>

                <div>
                    <label for="signup-gender" class="block text-sm font-medium mb-1">성별</label>
                    <select id="signup-gender" th:field="*{gender}" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg">
                        <option value="">선택 안 함</option>
                        <option value="남성">남성</option>
                        <option value="여성">여성</option>
                    </select>
                </div>

                <div>
                    <label for="signup-passwd" class="block text-sm font-medium mb-1">비밀번호</label>
                    <input type="password" id="signup-passwd" th:field="*{passwd}" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg" required>
                    <p th:if="${#fields.hasErrors('passwd')}" th:errors="*{passwd}" class="mt-1 text-xs text-red-500"></p>
                </div>

                <button class="w-full py-2.5 bg-neutral-950 text-white rounded-lg">
                    회원가입
                </button>
            </form>
        </div>
    </div>

    <div class="mt-4 text-center">
        <a href="#" class="text-sm text-blue-500">비밀번호를 잊으셨나요?</a>
    </div>

    <p class="mt-6 text-center text-sm text-neutral-500">
        © 2026 kyungsung CDN
    </p>
</div>

<script th:inline="javascript">
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const formLogin = document.getElementById('form-login');
    const formSignup = document.getElementById('form-signup');
    const wrapper = document.getElementById('form-wrapper');

    function setHeight(el) {
        wrapper.style.height = el.scrollHeight + 'px';
    }

    function activateTab(active, inactive) {
        active.classList.add('border-b-2', 'border-black', 'text-black');
        active.classList.remove('text-neutral-400');
        inactive.classList.remove('border-b-2', 'border-black', 'text-black');
        inactive.classList.add('text-neutral-400');
    }

    function showLogin() {
        activateTab(tabLogin, tabSignup);
        formSignup.classList.add('hidden');
        formLogin.classList.remove('hidden');
        setHeight(formLogin);
    }

    function showSignup() {
        activateTab(tabSignup, tabLogin);
        formLogin.classList.add('hidden');
        formSignup.classList.remove('hidden');
        setHeight(formSignup);
    }

    window.addEventListener('load', () => {
        setTimeout(() => {
            const signupError = /*[[${signupError}]]*/ false;
            if (signupError) {
                showSignup();
            } else {
                showLogin();
            }
        }, 10);
    });

    tabLogin.addEventListener('click', showLogin);
    tabSignup.addEventListener('click', showSignup);
</script>
</body>
</html>
