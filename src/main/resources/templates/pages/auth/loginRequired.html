<div th:replace="~{layout/layout :: layout(~{::content})}">
    <div th:fragment="content">
        <main class="mx-auto flex min-h-[520px] max-w-xl items-center justify-center px-4 py-12">
            <section class="w-full border border-neutral-200 bg-white p-6 text-center dark:border-neutral-700 dark:bg-neutral-800">
                <p class="text-sm font-semibold text-neutral-500">로그인이 필요합니다</p>
                <h1 class="mt-2 text-2xl font-bold text-neutral-950 dark:text-neutral-100"
                    th:text="${loginRequiredMessage ?: '로그인 후 사용할 수 있습니다.'}">
                    로그인 후 사용할 수 있습니다.
                </h1>
                <div class="mt-6 flex justify-center gap-2">
                    <a href="/login"
                       class="inline-flex items-center justify-center rounded-lg bg-neutral-950 px-5 py-2 text-sm font-bold text-white hover:bg-neutral-800">
                        <span th:text="${loginRequiredAction ?: '로그인 페이지로 이동'}">로그인 페이지로 이동</span>
                    </a>
                    <a href="/"
                       class="inline-flex items-center justify-center rounded-lg border border-neutral-300 px-5 py-2 text-sm font-bold text-neutral-700 hover:bg-neutral-100 dark:border-neutral-600 dark:text-neutral-100 dark:hover:bg-neutral-700">
                        홈으로
                    </a>
                </div>
            </section>
        </main>
    </div>
</div>
