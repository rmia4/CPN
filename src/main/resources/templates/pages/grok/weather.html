<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>24시간 단기 날씨 예보</title>
    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .weather-card {
            transition: transform 0.2s;
        }
        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">

    <!-- 1. 날씨 정보 헤더 (위치 및 기준 날짜) -->
    <div class="row mb-4 text-center">
        <div class="col">
            <h1 class="display-5 fw-bold">단기 날씨 예보</h1>
            <p class="lead text-muted">
                <!-- SortedWeather 객체의 필드값 출력 -->
                기준 위치 좌표 (X / Y): <span th:text="${weatherData.baseLocation}">60 / 127</span> <br>
                조회 일자: <span th:text="${weatherData.targetDate}">20231024</span>
            </p>
        </div>
    </div>

    <!-- 2. 24시간 데이터 카드 목록 -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

        <!-- 타임리프 반복문: hourlyWeather 리스트를 순회 -->
        <!-- 'stat' 변수를 활용해 현재 몇 번째 인덱스(시간)인지 파악 -->
        <div class="col" th:each="info, stat : ${weatherData.hourlyWeather}">
            <div class="card h-100 weather-card shadow-sm">

                <div class="card-header bg-primary text-white text-center">
                    <!-- 기준 시간으로부터 +n 시간 뒤 -->
                    <h5 class="mb-0" th:text="'+ ' + ${stat.index} + ' 시간 뒤'">+ 0 시간 뒤</h5>
                </div>

                <div class="card-body">
                    <!-- WeatherInfo 객체의 세부 필드값 출력 -->
                    <!-- 값이 비어있을 경우(null) '-' 로 표시되도록 안전 연산자 처리 -->
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            하늘상태 (SKY)
                            <span class="badge bg-info rounded-pill" th:text="${info.sky ?: '-'}">1</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            기온 (TMP)
                            <span class="fw-bold" th:text="${info.temperature != null ? info.temperature + '℃' : '-'}">20℃</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            강수확률 (POP)
                            <span class="text-danger" th:text="${info.rainPercent != null ? info.rainPercent + '%' : '-'}">30%</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            강수량 (PCP)
                            <span th:text="${info.rainAmount ?: '-'}">강수없음</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            습도 (REH)
                            <span class="text-primary" th:text="${info.humidityPercent != null ? info.humidityPercent + '%' : '-'}">60%</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            풍속 (WSD)
                            <span th:text="${info.windSpeed != null ? info.windSpeed + ' m/s' : '-'}">2 m/s</span>
                        </li>
                    </ul>
                </div>

                <!-- 최고/최저 기온은 특정 시간에만 값이 있으므로, 값이 존재할 때만 푸터를 보여줌 -->
                <div class="card-footer bg-transparent border-top-0 text-muted small text-center"
                     th:if="${info.maxTemp != null or info.minTemp != null}">
                    <span th:if="${info.maxTemp != null}" th:text="'최고: ' + ${info.maxTemp} + '℃ '">최고: 25℃</span>
                    <span th:if="${info.minTemp != null}" th:text="'최저: ' + ${info.minTemp} + '℃'">최저: 15℃</span>
                </div>

            </div>
        </div>
        <!-- 반복문 끝 -->

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
