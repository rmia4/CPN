<div th:replace="~{layout/layout :: layout(~{::content})}">

    <div th:fragment="content">
        <main class="min-h-screen flex flex-col items-center pt-8 bg-gray-50">
            <div class="text-center mb-10">
                <!-- 상단 -->
                <div class="text-2xl font-bold text-gray-900">CPN</div>
                <div class="text-sm text-gray-500 mt-2">더 스마트한 캠퍼스 생활의 시작</div>
            </div>
            <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md">
                <!-- 인증 영역 -->
                <div>
                    <!-- 탭 -->
                    <div id="form-tab" class="flex mb-6 border-b border-gray-200">
                        <button type="button"
                                data-target="login"
                                class="flex-1 py-2 text-sm font-medium border-b-2 border-black text-black">
                            로그인
                        </button>
                        <button type="button"
                                data-target="signup"
                                class="flex-1 py-2 text-sm font-medium border-b-2 text-gray-400">
                            회원가입
                        </button>
                    </div>

                    <!-- 폼 영역 -->
                    <div>
                        <div th:if="${param.error}" class="w-full px-4 py-2 text-sm text-red-500 border-2 border-red-500 rounded-lg bg-red-100 mb-2">
                            아이디 또는 비밀번호가 일치하지 않습니다.
                        </div>

                        <!-- 로그인 폼 -->
                        <form id="loginForm"
                              th:action="@{/login}" method="post"
                              class="space-y-4 transition-all duration-300 opacity-0 translate-y-2">

                            <div class="space-y-1">
                                <label class="block text-sm font-medium">아이디</label>
                                <input type="text" name="userId"
                                       th:value="${param.userId}" placeholder="아이디"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black"
                                       required>
                            </div>

                            <div class="space-y-1">
                                <label class="block text-sm font-medium">비밀번호</label>
                                <input type="password" name="passwd" placeholder="비밀번호"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black"
                                       required>
                            </div>

                            <button type="submit"
                                    class="w-full py-2 bg-black text-white rounded-lg hover:bg-gray-800 transition">
                                로그인
                            </button>
                        </form>

                        <!-- 회원가입 폼 -->
                        <form id="signupForm"
                              th:action="@{/signup}" method="post"
                              class="space-y-4 hidden transition-all duration-300 opacity-0 translate-y-2">

                            <div class="space-y-1">
                                <label class="block text-sm font-medium">이름</label>
                                <input type="text" name="name" placeholder="이름"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black"
                                       required>
                            </div>

                            <div class="space-y-1">
                                <label class="block text-sm font-medium">아이디</label>
                                <input type="text" name="userId" placeholder="아이디"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black"
                                       required>
                            </div>

                            <div class="space-y-1">
                                <label class="block text-sm font-medium">비밀번호</label>
                                <input type="password" name="passwd" placeholder="비밀번호"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black"
                                       required>
                            </div>

                            <button type="submit"
                                    class="w-full py-2 bg-black text-white rounded-lg hover:bg-gray-800 transition">
                                회원가입
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </main>

        <script>
            const tabs = document.querySelectorAll("#form-tab button");
            const loginForm = document.getElementById("loginForm");
            const signupForm = document.getElementById("signupForm");

            function switchTab(target) {
                const isLogin = target === "login";

                const showForm = isLogin ? loginForm : signupForm;
                const hideForm = isLogin ? signupForm : loginForm;


                // 폼 전환
                // 기존 폼 숨김
                hideForm.classList.add("hidden");

                // 새 폼 표시
                showForm.classList.remove("hidden");

                requestAnimationFrame(() => {
                    showForm.classList.add("opacity-100", "translate-y-0");
                    hideForm.classList.remove("opacity-100", "translate-y-0");
                });

                // 탭 스타일
                tabs.forEach(tab => {
                    tab.classList.remove("border-black", "text-black");
                    tab.classList.add("text-gray-400");
                });

                const activeTab = document.querySelector(`[data-target="${target}"]`);
                activeTab.classList.add("border-black", "text-black");
                activeTab.classList.remove("text-gray-400");
            }

            // 초기 상태
            switchTab("login");

            // 이벤트
            tabs.forEach(tab => {
                tab.addEventListener("click", () => {
                    switchTab(tab.dataset.target);
                });
            });
        </script>
    </div>
</div>
