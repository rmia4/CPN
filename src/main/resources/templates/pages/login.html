<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CPN 소개</title>
</head>
<body class="bg-white dark:bg-neutral-800 dark:border-neutral-700 font-sans min-h-screen flex items-center justify-center px-4">


<!-- 로그인 영역 -->
<div class="w-full max-w-md">

    <!-- 타이틀 -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold tracking-tight">
            <span class="text-blue-500">CDN</span>
        </h1>
        <p class="mt-2 text-neutral-500 text-sm">
            지도기반 캠퍼스 어쩌구
        </p>
    </div>

    <!-- 카드 -->
    <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden">

        <!-- 탭 -->
        <div class="flex border-b border-neutral-200">
            <button id="tab-login"
                    class="flex-1 py-3 text-sm font-medium border-b-2 border-black">
                로그인
            </button>
            <button id="tab-signup"
                    class="flex-1 py-3 text-sm font-medium text-neutral-400">
                회원가입
            </button>
        </div>

        <!-- ⭐ 핵심: wrapper -->
        <div id="form-wrapper"
             class="transition-all duration-300 ease-in-out min-h-[300px] md:min-h-[250px]">

            <!-- 로그인 -->
            <form id="form-login" class="p-6 space-y-4"  th:action="@{/login}" method="POST">
                <div>
                    <label for="userId" class="block text-sm font-medium mb-1">아이디</label>
                    <input type="text" id="userId" name="userId" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1"  for="passwd" >비밀번호</label>
                    <input type="password" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg"
                           id="passwd" name="passwd" required>
                </div>

                <button class="w-full py-2.5 bg-neutral-950 text-white rounded-lg">
                    로그인
                </button>
            </form>

            <!-- 회원가입 -->
            <form id="form-signup" class="p-6 space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium mb-1">이름</label>
                    <input type="text" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">아이디</label>
                    <input type="email" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">비밀번호</label>
                    <input type="password" class="w-full px-3 py-2.5 bg-neutral-50 border rounded-lg">
                </div>

                <button class="w-full py-2.5 bg-neutral-950 text-white rounded-lg">
                    회원가입
                </button>
            </form>

        </div>
    </div>
    <!-- 하단 -->
    <div class="mt-4 text-center">
        <a href="#" class="text-sm text-blue-500">비밀번호를 잊으셨나요?</a>
    </div>

    <p class="mt-6 text-center text-sm text-neutral-500">
        © 2026 kyungsung CDN
    </p>
</div>

<!-- 탭 전환 JS -->
<script>
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');

    const formLogin = document.getElementById('form-login');
    const formSignup = document.getElementById('form-signup');
    const wrapper = document.getElementById('form-wrapper');

    // 👉 현재 보이는 폼 기준으로 높이 맞추기
    function setHeight(el) {
        wrapper.style.height = el.scrollHeight + 'px';
    }

    // 초기 높이 설정
    window.addEventListener('load', () => {
        activateTab(tabLogin, tabSignup);

        setTimeout(() => {
            setHeight(formLogin);
        }, 10);
    });

    // 활성화 탭 표시
    function activateTab(active, inactive) {
        // 활성 탭
        active.classList.add('border-b-2', 'border-black', 'text-black');
        active.classList.remove('text-neutral-400');

        // 비활성 탭
        inactive.classList.remove('border-b-2', 'border-black', 'text-black');
        inactive.classList.add('text-neutral-400');
    }

    // 이벤트
    tabLogin.addEventListener('click', () => {
        activateTab(tabLogin, tabSignup);
    });

    tabSignup.addEventListener('click', () => {
        activateTab(tabSignup, tabLogin);
    });

    // 로그인 탭
    tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('border-black');
        tabLogin.classList.remove('text-neutral-400');

        tabSignup.classList.remove('border-black');
        tabSignup.classList.add('text-neutral-400');

        formSignup.classList.add('hidden');
        formLogin.classList.remove('hidden');

        setHeight(formLogin);
    });

    // 회원가입 탭
    tabSignup.addEventListener('click', () => {
        tabSignup.classList.add('border-black');
        tabSignup.classList.remove('text-neutral-400');

        tabLogin.classList.remove('border-black');
        tabLogin.classList.add('text-neutral-400');

        formLogin.classList.add('hidden');
        formSignup.classList.remove('hidden');

        setHeight(formSignup);
    });
</script>
</body>
</html>
