<div th:replace="~{layout/layout :: layout(~{::content})}">

    <div th:fragment="content">
        <style>
            #map {
                width: 100%;
                height: 500px;
                border: 1px solid #dee2e6;
                border-radius: 8px;
            }

            #pinDetail {
                position: fixed;
                top: 80px;
                right: 20px;
                width: 300px;
                z-index: 30;
            }

            @media (max-width: 640px) {
                #pinDetail {
                    top: auto;
                    right: 12px;
                    bottom: 16px;
                    left: 12px;
                    width: auto;
                    max-height: 72vh;
                    overflow-y: auto;
                    z-index: 60;
                }

                #pinDetail .card-header {
                    position: sticky;
                    top: 0;
                    z-index: 2;
                    background: #fff;
                    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
                }

                html.dark #pinDetail .card-header {
                    background: #262626;
                }

                #detailName {
                    max-width: calc(100% - 36px);
                    overflow: hidden;
                    text-overflow: ellipsis;
                    white-space: nowrap;
                }

                #detailImage {
                    max-height: 260px;
                    object-fit: contain;
                }

                #pinDetail .card-body {
                    padding-top: 0.875rem;
                }
            }
        </style>

        <main class="min-h-[600px]">
            <div class="relative">
                <!-- 지도 영역 -->
                <div id="map" class="w-full min-h-screen bg-gray-200"></div>
                <div id="buildingTooltip"
                     class="pointer-events-none absolute z-[40] hidden rounded bg-neutral-900 px-2 py-1 text-xs font-semibold text-white shadow">
                </div>
                <div id="mapLoginPrompt"
                     class="fixed inset-0 z-[3000] hidden items-center justify-center bg-black/40 px-4">
                    <div class="relative w-full max-w-md rounded-xl border border-neutral-200 bg-white p-5 text-sm shadow-lg dark:border-neutral-700 dark:bg-neutral-800">
                        <button type="button"
                                id="mapLoginPromptClose"
                                class="absolute right-3 top-3 text-xl leading-none text-neutral-400 hover:text-neutral-700 dark:hover:text-neutral-100"
                                aria-label="닫기">
                            &times;
                        </button>
                        <p class="pr-8 font-semibold text-neutral-900 dark:text-neutral-100">로그인 후 핀을 추가할 수 있습니다.</p>
                        <div class="mt-4 flex justify-end gap-2">
                            <button type="button"
                                    id="mapLoginPromptCancel"
                                    class="rounded-lg border border-neutral-300 px-4 py-2 text-xs font-bold text-neutral-700 hover:bg-neutral-100 dark:border-neutral-600 dark:text-neutral-100 dark:hover:bg-neutral-700">
                                닫기
                            </button>
                        <a href="/login"
                           class="rounded-lg bg-neutral-900 px-4 py-2 text-xs font-bold text-white hover:bg-neutral-700">
                            로그인 페이지로 이동
                        </a>
                        </div>
                    </div>
                </div>
                <!-- 필터 UI -->
                <div id="filterBox"
                     class="absolute top-3 left-3 z-[30] flex gap-2 bg-white p-1.5 rounded-full shadow">

                    <button class="filter-btn px-3 py-1 text-sm rounded-full bg-blue-500 dark:text-white text-white" data-type="all">
                        전체
                    </button>

                    <button class="filter-btn px-3 py-1 text-sm rounded-full dark:text-white text-gray-600" data-type="분실물">
                        분실물
                    </button>

                    <button class="filter-btn px-3 py-1 text-sm rounded-full dark:text-white text-gray-600" data-type="분실했어요">
                        분실
                    </button>

                    <button class="filter-btn px-3 py-1 text-sm rounded-full dark:text-white text-gray-600" data-type="습득했어요">
                        습득
                    </button>

                    <button class="filter-btn px-3 py-1 text-sm rounded-full dark:text-white text-gray-600" data-type="밥친구">
                        밥친구
                    </button>

                </div>
            </div>

            <!-- 토스트 UI -->
            <div id="toast"
                 class="fixed bottom-20 left-1/2 -translate-x-1/2 z-[2000]
            bg-black text-white text-sm px-4 py-2 rounded-lg
            opacity-0 translate-y-5 pointer-events-none
            transition-all duration-300">
            </div>

            <div id="confirmModal"
                 class="fixed inset-0 z-[3000] hidden items-center justify-center bg-black/40 px-4 opacity-0 transition-opacity duration-150">
                <div id="confirmModalPanel"
                     class="w-full max-w-sm scale-95 rounded-xl bg-white p-6 shadow-xl transition-all duration-150 dark:bg-neutral-800">
                    <p id="confirmModalMessage"
                       class="whitespace-pre-line text-sm font-medium text-gray-800 dark:text-neutral-100"></p>
                    <div class="mt-6 flex justify-end gap-2">
                        <button type="button"
                                id="confirmModalCancel"
                                class="rounded-lg border border-gray-300 px-4 py-2 text-sm font-semibold text-gray-700 transition hover:bg-gray-100 dark:border-neutral-600 dark:text-neutral-100 dark:hover:bg-neutral-700">
                            취소
                        </button>
                        <button type="button"
                                id="confirmModalOk"
                                class="rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow transition hover:bg-red-700">
                            확인
                        </button>
                    </div>
                </div>
            </div>

            <!-- 핀 상세 패널 -->
            <div id="pinDetail" class="card shadow hidden">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div class="min-w-0">
                        <span id="detailName" class="block fw-bold"></span>
                        <span id="detailCommentCount" class="mt-1 inline-flex rounded-full bg-neutral-100 px-2 py-1 text-xs font-semibold text-neutral-500 dark:bg-neutral-700 dark:text-neutral-200">
                            0
                        </span>
                    </div>
                    <button type="button" id="detailCloseBtn" class="btn-close" aria-label="닫기"></button>
                </div>
                <div class="card-body">
                    <img id="detailImage" alt="핀 이미지" class="hidden w-full max-h-64 object-contain rounded-lg mb-3"/>
                    <p id="detailMeetingTime" class="hidden text-sm font-semibold text-blue-600 mb-2"></p>
                    <p id="detailDescription" class="text-muted small mb-3"></p>
                    <div class="flex items-center gap-2">
                        <a id="detailPostLink"
                           href="#"
                           class="flex-1 rounded-lg bg-neutral-900 px-4 py-2 text-center text-sm font-semibold text-white transition hover:bg-neutral-700">
                            게시글 보기
                        </a>
                        <button id="detailDeleteBtn"
                                type="button"
                                aria-label="핀 삭제"
                                class="hidden h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-neutral-100 text-neutral-500 transition hover:bg-red-800 hover:text-white dark:bg-neutral-700 dark:text-neutral-200 dark:hover:bg-red-800">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                 stroke-width="1.5" stroke="currentColor" class="size-5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                            </svg>
                        </button>
                    </div>
                    <div class="mt-4 border-t pt-3">
                        <p class="mb-2 text-sm font-semibold">댓글</p>
                        <div id="detailComments" class="space-y-2 text-sm text-neutral-700"></div>
                        <form id="detailCommentForm" class="mt-3 flex gap-2">
                            <input id="detailCommentInput"
                                   name="content"
                                   type="text"
                                   class="flex-1 rounded border px-2 py-1 text-sm"
                                   placeholder="댓글을 입력하세요">
                            <button type="submit"
                                    class="rounded bg-neutral-900 px-3 py-1 text-sm font-semibold text-white">
                                등록
                            </button>
                        </form>
                        <div id="detailLoginPrompt" class="mt-2 hidden text-xs text-neutral-500">
                            로그인 후 댓글을 작성할 수 있습니다.
                            <a href="/login" class="font-semibold underline">로그인 페이지로 이동</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 핀 추가 모달 -->
            <div class="modal fade" id="pinModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">핀 추가</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form id="pinForm">
                            <div class="modal-body">
                                <input type="hidden" id="pinLat" name="lat">
                                <input type="hidden" id="pinLng" name="lon">
                                <div class="mb-3">
                                    <label class="form-label">카테고리</label>
                                    <div class="d-flex gap-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="category" id="lost" value="분실물" checked>
                                            <label class="form-check-label" for="lost">분실물</label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="category" id="meal" value="밥친구">
                                            <label class="form-check-label" for="meal">밥친구</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3" id="lostTypeBox">
                                    <label class="form-label" for="lostType">분실물 유형</label>
                                    <select id="lostType" class="form-select">
                                        <option value="분실했어요">분실했어요</option>
                                        <option value="습득했어요">습득했어요</option>
                                    </select>
                                </div>
                                <div class="mb-3 hidden" id="meetingTimeBox">
                                    <label class="form-label" for="meetingTime">밥친구 약속 시간</label>
                                    <input type="datetime-local" id="meetingTime" name="meetingTime" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="title">제목 <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span id="titlePrefixBadge" class="input-group-text bg-light fw-semibold text-secondary"></span>
                                        <input type="text" id="title" name="title" class="form-control" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="description">설명</label>
                                    <textarea id="description" name="description" class="form-control" rows="3" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">사진</label>

                                    <div class="d-flex gap-2">
                                        <label class="btn btn-outline-primary mb-0">
                                            파일 선택
                                            <input
                                                    type="file"
                                                    name="image"
                                                    accept="image/*"
                                                    hidden
                                                    id="fileInput"
                                            >
                                        </label>

                                        <label class="btn btn-outline-secondary mb-0">
                                            카메라
                                            <input
                                                    type="file"
                                                    name="image"
                                                    accept="image/*"
                                                    capture="environment"
                                                    hidden
                                                    id="cameraInput"
                                            >
                                        </label>
                                    </div>

                                    <img
                                            id="preview"
                                            alt="미리보기 이미지"
                                            class="hidden mt-3 max-w-full max-h-48 object-contain rounded-lg border"
                                    >
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                                <button type="submit" class="btn btn-primary">저장</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        <script th:inline="javascript">
            /* 전역 상태 */
            const PIN_ADD_URL = '/mapPin/add';
            const IS_AUTHENTICATED = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
            const INITIAL_MAP_CATEGORY = /*[[${initialCategory}]]*/ null;
            let savedPins = /*[[${postPinList}]]*/ [];
            if (!Array.isArray(savedPins)) {
                savedPins = [];
            }
            let map, pinModal;
            const markers = {};
            const buildingMarkers = [];
            let busMarker = null;
            let ksMarker = null;
            const pinForm = document.getElementById("pinForm");
            const pinDetail = document.getElementById("pinDetail");
            const detailImage = document.getElementById("detailImage");
            const detailName = document.getElementById("detailName");
            const detailDescription = document.getElementById("detailDescription");
            const detailPostLink = document.getElementById("detailPostLink");
            const detailDeleteBtn = document.getElementById("detailDeleteBtn");
            const detailMeetingTime = document.getElementById("detailMeetingTime");
            const detailComments = document.getElementById("detailComments");
            const detailCommentCount = document.getElementById("detailCommentCount");
            const preview = document.getElementById("preview");
            const fileInput = document.getElementById("fileInput");
            const cameraInput = document.getElementById("cameraInput");
            const pinTitleInput = document.getElementById("title");
            const titlePrefixBadge = document.getElementById("titlePrefixBadge");
            const categoryRadios = document.querySelectorAll('input[name="category"]');
            const lostTypeBox = document.getElementById("lostTypeBox");
            const lostTypeSelect = document.getElementById("lostType");
            const meetingTimeBox = document.getElementById("meetingTimeBox");
            const meetingTimeInput = document.getElementById("meetingTime");
            const detailCommentForm = document.getElementById("detailCommentForm");
            const detailCommentInput = document.getElementById("detailCommentInput");
            const detailLoginPrompt = document.getElementById("detailLoginPrompt");
            const detailCloseBtn = document.getElementById("detailCloseBtn");
            const mapLoginPrompt = document.getElementById("mapLoginPrompt");
            const mapLoginPromptClose = document.getElementById("mapLoginPromptClose");
            const mapLoginPromptCancel = document.getElementById("mapLoginPromptCancel");
            let selectedDetailPin = null;
            let activeDetailPinId = null;
            let lastMarkerActivationTime = 0;
            const PIN_TAG_STYLES = {
                "분실물": {
                    color: "#ef4444",
                    stroke: "#b91c1c",
                    label: "!"
                },
                "분실했어요": {
                    color: "#f97316",
                    stroke: "#c2410c",
                    label: "🍚"
                },
                "습득했어요": {
                    color: "#22c55e",
                    stroke: "#15803d",
                    label: "+"
                },
                "밥친구": {
                    color: "#3b82f6",
                    stroke: "#1d4ed8",
                    label: "meal"
                },
                default: {
                    color: "#64748b",
                    stroke: "#334155",
                    label: "P"
                }
            };
            const BUILDING_LABELS = [
                {label: "8호관", name: "공학2관", lat: 35.14301041062783, lon: 129.0954902100567},
                {label: "6호관", name: "인문관", lat: 35.14171782135296, lon: 129.09772896051447},
                {label: "30호관", name: "건학기념관", lat: 35.140518794850834, lon: 129.09810804605524},
                {label: "25호관", name: "용무관", lat: 35.139296354527616, lon: 129.0989949631695},
                {label: "2호관", name: "자연관", lat: 35.13903314727153, lon: 129.09861587762873},
                {label: "27호관", name: "도서관", lat: 35.138834279002545, lon: 129.10063289880793},
                {label: "1호관", name: "한성관", lat: 35.13798615887203, lon: 129.09873747110407},
                {label: "26호관", name: "멀티미디어관", lat: 35.138869373438254, lon: 129.09750007867854},
                {label: "4호관", name: "상학관", lat: 35.137477282552524, lon: 129.0967633652691},
                {label: "5호관", name: "사회관", lat: 35.13900975102981, lon: 129.09659885644953},
                {label: "23호관", name: "학생회관", lat: 35.13832540798454, lon: 129.09990333795588},
                {label: "9호관", name: "약과학관", lat: 35.142957773986055, lon: 129.09601234674494},
                {label: "7호관", name: "공학1관", lat: 35.14296362276344, lon: 129.09601234674494}
            ];
            const BUS_TIME_INFO = {
                title: "공대버스 시간표",
                description: "공대버스 운행 시간표입니다.",
                lat: 35.1393608600623,
                lon: 129.099335432053,
                imageUrl: "/dummyImages/bustime.jpg"
            };
            const KS_MARKER_INFO = {
                title: "KS",
                lat: 35.141979265274074,
                lon: 129.09504890441934,
                imageUrl: "/dummyImages/ks.svg"
            };

            /* 지도 초기화 */
            function initTmap() {
                pinModal = new bootstrap.Modal(document.getElementById('pinModal'));

                map = new Tmapv2.Map('map', {
                    center: new Tmapv2.LatLng(35.14064279255668, 129.09759521484415),
                    width: '100%',
                    height: '100%',
                    zoom: 17,
                });

                map.addListener('click', function(e) {
                    closeDetail();

                    const clickedLat = e.latLng.lat();
                    const clickedLon = e.latLng.lng();

                    if (!IS_AUTHENTICATED) {
                        showMapLoginPrompt();
                        return;
                    }

                    pinForm.reset();
                    document.getElementById('pinLat').value = clickedLat;
                    document.getElementById('pinLng').value = clickedLon;
                    applyInitialCategory();
                    updateLostTypeVisibility();
                    updateTitlePrefixBadge();
                    pinModal.show();
                });

                renderPins();
                renderBuildingLabels();
                renderBusTimeMarker();
                renderKsMarker();
            }

            /* 핀 렌더링 */
            function renderPins() {

                const type = getCurrentFilter();

                Object.values(markers).forEach(marker => marker.setMap(null));

                for (let key in markers) delete markers[key];

                const categoryLabel = {
                    "분실물": '[분실물] ',
                    "밥친구": '[밥친구] '
                };

                savedPins.forEach(pin => {
                    const pinTag = getPinTag(pin);
                    if (type === 'all' || pin.category === type || pinTag === type) {

                        const marker = new Tmapv2.Marker(Object.assign({
                            position: new Tmapv2.LatLng(pin.lat, pin.lon),
                            title: (categoryLabel[pin.category] || '') + pin.title,
                            zIndex: 100,
                            map: map
                        }, getPinMarkerOptions(pin)));

                        addMarkerActivation(marker, () => showDetail(pin));

                        markers[pin.id] = marker;
                    }
                });
            }

            function addMarkerActivation(marker, handler) {
                const activate = (event) => {
                    const now = Date.now();
                    if (now - lastMarkerActivationTime < 350) return;
                    lastMarkerActivationTime = now;

                    const sourceEvent = event && (event.originalEvent || event.domEvent || event);
                    sourceEvent?.preventDefault?.();
                    sourceEvent?.stopPropagation?.();

                    handler(event);
                };

                ["click", "touchstart", "pointerdown"].forEach((eventName) => {
                    try {
                        marker.addListener(eventName, activate);
                    } catch (error) {
                        // Some Tmap marker builds expose only a subset of DOM-like events.
                    }
                });
            }

            function renderBuildingLabels() {
                buildingMarkers.forEach(marker => marker.setMap(null));
                buildingMarkers.length = 0;

                BUILDING_LABELS.forEach(building => {
                    const markerLabel = getBuildingMarkerLabel(building.label);
                    const marker = new Tmapv2.Marker({
                        position: new Tmapv2.LatLng(building.lat, building.lon),
                        title: `${building.label}, ${building.name}`,
                        icon: getBuildingLabelIcon(markerLabel),
                        iconSize: new Tmapv2.Size(62, 26),
                        zIndex: 10,
                        map: map
                    });

                    marker.addListener("mouseover", (event) => showBuildingTooltip(building, event));
                    marker.addListener("mousemove", (event) => moveBuildingTooltip(event));
                    marker.addListener("mouseout", hideBuildingTooltip);

                    buildingMarkers.push(marker);
                });
            }

            function getBuildingMarkerLabel(label) {
                return `(${String(label).replace("호관", "")})`;
            }

            function renderStaticMarker(currentMarker, info, options) {
                if (currentMarker) {
                    currentMarker.setMap(null);
                }

                const marker = new Tmapv2.Marker({
                    position: new Tmapv2.LatLng(info.lat, info.lon),
                    title: info.title,
                    icon: options.icon || info.imageUrl,
                    iconSize: options.iconSize,
                    zIndex: options.zIndex || 80,
                    map: map
                });

                if (options.onClick) {
                    addMarkerActivation(marker, options.onClick);
                }

                return marker;
            }

            function renderBusTimeMarker() {
                busMarker = renderStaticMarker(busMarker, BUS_TIME_INFO, {
                    icon: getBusMarkerIcon(),
                    iconSize: new Tmapv2.Size(42, 42),
                    onClick: showBusTimeDetail
                });
            }

            function renderKsMarker() {
                ksMarker = renderStaticMarker(ksMarker, KS_MARKER_INFO, {
                    iconSize: new Tmapv2.Size(101, 101)
                });
            }

            /* 필터 처리 */
            function applyFilter(type) {
                document.querySelectorAll('.filter-btn').forEach(button => {
                    const isActive = button.dataset.type === type;
                    button.classList.toggle('bg-blue-500', isActive);
                    button.classList.toggle('text-white', isActive);
                    button.classList.toggle('text-gray-600', !isActive);
                });

                renderPins();
            }

            /* 모달 및 상세 패널 처리 */
            function resetDetailDeleteButton() {
                detailDeleteBtn.classList.add('hidden');
                detailDeleteBtn.classList.remove('flex');
                detailDeleteBtn.disabled = true;
                detailDeleteBtn.removeAttribute('data-delete-action');
                detailDeleteBtn.removeAttribute('data-csrf-name');
                detailDeleteBtn.removeAttribute('data-csrf-value');
                detailDeleteBtn.onclick = null;
            }

            function setDetailImage(src) {
                if (!src) {
                    detailImage.classList.add('hidden');
                    detailImage.removeAttribute('src');
                    return;
                }

                detailImage.src = src;
                detailImage.classList.remove('hidden');
                detailImage.onerror = () => {
                    detailImage.classList.add('hidden');
                };
            }

            function showDetail(pin) {
                selectedDetailPin = pin;
                activeDetailPinId = String(pin.id);
                detailName.textContent = pin.title;
                detailDescription.textContent = pin.description || '';
                renderMeetingTime(pin);
                loadPinComments(pin.id);

                detailPostLink.href = `/post/detail/${pin.id}`;
                detailPostLink.textContent = '게시글 보기';
                detailPostLink.classList.remove('hidden', 'disabled');
                setDetailImage(pin.imageUrl);
                setDetailCommentCount(null);
                resetDetailDeleteButton();
                detailDeleteBtn.onclick = () => deletePin(pin.id);

                pinDetail.classList.remove('hidden');
                updateDetailDeleteButton(pin);
            }

            function showBusTimeDetail() {
                detailName.textContent = BUS_TIME_INFO.title;
                detailDescription.textContent = BUS_TIME_INFO.description;
                selectedDetailPin = null;
                activeDetailPinId = null;
                detailComments.innerHTML = "";
                setDetailCommentCount(0);
                detailCommentForm.classList.add("hidden");
                detailLoginPrompt.classList.add("hidden");
                detailMeetingTime.classList.add("hidden");

                detailPostLink.href = '#';
                detailPostLink.classList.add('hidden');
                resetDetailDeleteButton();
                setDetailImage(BUS_TIME_INFO.imageUrl);
                pinDetail.classList.remove('hidden');
            }

            function closeDetail() {
                pinDetail.classList.add('hidden');
                selectedDetailPin = null;
                activeDetailPinId = null;
            }

            function renderMeetingTime(pin) {
                if (pin.category === "밥친구" && pin.meetingTime) {
                    detailMeetingTime.textContent = `약속 시간 ${formatDateTime(pin.meetingTime)}`;
                    detailMeetingTime.classList.remove("hidden");
                    return;
                }

                detailMeetingTime.classList.add("hidden");
            }

            function formatDateTime(value) {
                if (typeof value === "string" && /^\d{4}\.\d{2}\.\d{2}\s\d{2}:\d{2}$/.test(value)) {
                    return value;
                }

                if (Array.isArray(value)) {
                    const [year, month, day, hour = 0, minute = 0] = value;
                    const pad = number => String(number).padStart(2, "0");
                    return `${year}.${pad(month)}.${pad(day)} ${pad(hour)}:${pad(minute)}`;
                }

                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return value;

                const pad = number => String(number).padStart(2, "0");
                return `${date.getFullYear()}.${pad(date.getMonth() + 1)}.${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
            }

            async function loadPinComments(postId) {
                setDetailCommentCount(null);
                detailComments.innerHTML = '<p class="text-xs text-neutral-500">댓글을 불러오는 중입니다.</p>';
                detailCommentForm.classList.toggle("hidden", !IS_AUTHENTICATED);
                detailLoginPrompt.classList.toggle("hidden", IS_AUTHENTICATED);

                try {
                    const response = await fetch(`/mapPin/${postId}/comments`);
                    if (!response.ok) throw new Error();
                    const comments = await response.json();

                    if (!comments || comments.length === 0) {
                        setDetailCommentCount(0);
                        detailComments.innerHTML = '<p class="text-xs text-neutral-500">아직 댓글이 없습니다.</p>';
                        return;
                    }

                    setDetailCommentCount(comments.length);
                    detailComments.innerHTML = comments.map(comment => `
                        <div class="border-t pt-2">
                            <div class="text-xs text-neutral-400">${escapeHtml(comment.userName || "")} ${escapeHtml(formatDateTime(comment.createdAt))}</div>
                            <p class="whitespace-pre-line">${escapeHtml(comment.content || "")}</p>
                        </div>
                    `).join("");
                } catch (error) {
                    setDetailCommentCount(null);
                    detailComments.innerHTML = '<p class="text-xs text-red-500">댓글을 불러오지 못했습니다.</p>';
                }
            }

            function setDetailCommentCount(count) {
                if (count === null) {
                    detailCommentCount.textContent = "댓글 확인 중";
                    return;
                }

                detailCommentCount.textContent = `댓글 ${count}개`;
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function showToast(message) {
                const toast = document.getElementById('toast');

                toast.textContent = message;
                toast.classList.remove('opacity-0', 'pointer-events-none');
                toast.classList.add('opacity-100');

                setTimeout(() => {
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0', 'pointer-events-none');
                }, 2000);
            }

            function showMapLoginPrompt() {
                mapLoginPrompt.classList.add("flex");
                mapLoginPrompt.classList.remove("hidden");
            }

            function hideMapLoginPrompt() {
                mapLoginPrompt.classList.add("hidden");
                mapLoginPrompt.classList.remove("flex");
            }

            function showConfirmModal(message) {
                const modal = document.getElementById('confirmModal');
                const panel = document.getElementById('confirmModalPanel');
                const messageBox = document.getElementById('confirmModalMessage');
                const cancelButton = document.getElementById('confirmModalCancel');
                const okButton = document.getElementById('confirmModalOk');

                messageBox.textContent = message;
                modal.classList.remove('hidden');
                modal.classList.add('flex');

                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    panel.classList.remove('scale-95');
                    panel.classList.add('scale-100');
                });

                return new Promise(resolve => {
                    const close = (result) => {
                        modal.classList.add('opacity-0');
                        panel.classList.remove('scale-100');
                        panel.classList.add('scale-95');

                        setTimeout(() => {
                            modal.classList.add('hidden');
                            modal.classList.remove('flex');
                            resolve(result);
                        }, 150);
                    };

                    cancelButton.onclick = () => close(false);
                    okButton.onclick = () => close(true);
                    modal.onclick = event => {
                        if (event.target === modal) close(false);
                    };
                });
            }

            function showBuildingTooltip(building, event) {
                const tooltip = document.getElementById('buildingTooltip');
                tooltip.textContent = `${building.label}, ${building.name}`;
                tooltip.classList.remove('hidden');
                moveBuildingTooltip(event);
            }

            function moveBuildingTooltip(event) {
                const tooltip = document.getElementById('buildingTooltip');
                const mapElement = document.getElementById('map');
                const mapRect = mapElement.getBoundingClientRect();
                const sourceEvent = event && (event.originalEvent || event.domEvent || event);
                const clientX = sourceEvent && typeof sourceEvent.clientX === 'number'
                    ? sourceEvent.clientX
                    : mapRect.left + (mapRect.width / 2);
                const clientY = sourceEvent && typeof sourceEvent.clientY === 'number'
                    ? sourceEvent.clientY
                    : mapRect.top + (mapRect.height / 2);

                tooltip.style.left = `${clientX - mapRect.left + 12}px`;
                tooltip.style.top = `${clientY - mapRect.top - 34}px`;
            }

            function hideBuildingTooltip() {
                document.getElementById('buildingTooltip').classList.add('hidden');
            }

            function handleImage(input) {
                const file = input.files[0];
                if (file) {
                    preview.src = URL.createObjectURL(file);
                    preview.classList.remove("hidden");
                } else {
                    preview.classList.add("hidden");
                }
            }

            function resetImageInput() {
                preview.src = "";
                preview.classList.add("hidden");

                fileInput.value = "";
                cameraInput.value = "";
            }

            function updateDetailDeleteButton(pin) {
                if (!IS_AUTHENTICATED) {
                    return;
                }

                fetch(`/post/detail/${pin.id}`, {
                    credentials: 'same-origin'
                })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('소유자 확인 실패');
                        }

                        return response.text();
                    })
                    .then(html => {
                        if (activeDetailPinId !== String(pin.id)) {
                            return;
                        }

                        const detailDocument = new DOMParser().parseFromString(html, 'text/html');
                        const deleteForm = detailDocument.querySelector('form[action="/post/delete"], form[action$="/post/delete"]');

                        if (!deleteForm || !deleteForm.querySelector(`input[name="postId"][value="${pin.id}"]`)) {
                            return;
                        }

                        const csrfInput = deleteForm.querySelector('input[type="hidden"][name^="_csrf"], input[type="hidden"][name="_csrf"]');

                        detailDeleteBtn.dataset.deleteAction = deleteForm.getAttribute('action') || '/post/delete';

                        if (csrfInput) {
                            detailDeleteBtn.dataset.csrfName = csrfInput.name;
                            detailDeleteBtn.dataset.csrfValue = csrfInput.value;
                        }

                        detailDeleteBtn.disabled = false;
                        detailDeleteBtn.classList.remove('hidden');
                        detailDeleteBtn.classList.add('flex');
                    })
                    .catch(() => {
                        detailDeleteBtn.disabled = true;
                        detailDeleteBtn.classList.add('hidden');
                        detailDeleteBtn.classList.remove('flex');
                    });
            }

            /* 유틸 */
            function getCurrentFilter() {
                return document.querySelector('.filter-btn.bg-blue-500')?.dataset.type || 'all';
            }

            function getSelectedPinCategory() {
                return document.querySelector('input[name="category"]:checked')?.value || '분실물';
            }

            function removeTitlePrefix(title) {
                const value = String(title || '');

                if (value.startsWith('[분실했어요]')) {
                    return value.substring('[분실했어요]'.length).trimStart();
                }

                if (value.startsWith('[습득했어요]')) {
                    return value.substring('[습득했어요]'.length).trimStart();
                }

                if (value.startsWith('[밥친구]')) {
                    return value.substring('[밥친구]'.length).trimStart();
                }

                return value.trimStart();
            }

            function getTitlePrefix() {
                const category = getSelectedPinCategory();
                if (category === '분실물') {
                    return `[${lostTypeSelect.value}]`;
                }

                return "";
            }

            function getSelectedPinTag() {
                const category = getSelectedPinCategory();
                return category === '분실물' ? lostTypeSelect.value : category;
            }

            function getPinTag(pin) {
                const title = String(pin.title || '');

                if (title.startsWith('[분실했어요]')) {
                    return '분실했어요';
                }

                if (title.startsWith('[습득했어요]')) {
                    return '습득했어요';
                }

                return pin.tag || pin.category || 'default';
            }

            /* 핀 스타일 설정 */
            function getPinMarkerStyle(pin, tag) {
                const tagText = `${tag || ''} ${pin.category || ''} ${pin.title || ''}`;
                const isFoundPin = tagText.includes("습득");
                const isLostPin = tagText.includes("분실");

                if (isFoundPin) return {color: "#14b8a6", stroke: "#047857", label: "", type: "found"};
                if (isLostPin) return {color: "#f97316", stroke: "#c2410c", label: "", type: "lost"};
                return {...(PIN_TAG_STYLES[tag] || PIN_TAG_STYLES.default), type: tag};
            }

            function getPinMarkerLabel(pin, style) {
                if (style.type === "found") {
                    return `
                        <g transform="translate(10 9.5) scale(0.66)" fill="none" stroke="${style.stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5"/>
                            <path d="M10 11.25h4"/>
                            <path d="M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/>
                        </g>
                    `;
                }

                if (style.type === "lost") {
                    return `
                        <g transform="translate(10 9.5) scale(0.66)" fill="none" stroke="${style.stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 9v3.75"/>
                            <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                            <path d="M12 15.75h.008v.008H12v-.008Z"/>
                        </g>
                    `;
                }

                if (style.type === "밥친구" || pin.category === "밥친구") {
                    return `
                        <g transform="translate(9.5 9) scale(0.265)">
                            <ellipse cx="26" cy="24" rx="5" ry="7" fill="${style.stroke}"/>
                            <rect x="24" y="30" width="4" height="16" rx="2" fill="${style.stroke}"/>
                            <rect x="36" y="18" width="3" height="28" rx="1.5" transform="rotate(12 36 18)" fill="${style.stroke}"/>
                            <rect x="42" y="18" width="3" height="28" rx="1.5" transform="rotate(12 42 18)" fill="${style.stroke}"/>
                        </g>
                    `;
                }

                return `<text x="18" y="21" text-anchor="middle" font-size="12" font-family="Arial, sans-serif" font-weight="700" fill="${style.stroke}">${style.label}</text>`;
            }

            function getPinMarkerOptions(pin) {
                const tag = getPinTag(pin);
                const style = getPinMarkerStyle(pin, tag);
                const label = getPinMarkerLabel(pin, style);
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="58" viewBox="0 0 48 58">
                        <rect width="48" height="58" fill="transparent" pointer-events="all"/>
                        <g transform="translate(6 12)">
                            <path d="M18 44C13 36 5 29 5 17.5C5 10.3 10.8 4 18 4s13 6.3 13 13.5C31 29 23 36 18 44Z" fill="${style.color}" stroke="${style.stroke}" stroke-width="2"/>
                            <circle cx="18" cy="17.5" r="8.5" fill="white" fill-opacity="0.95"/>
                            ${label}
                        </g>
                    </svg>
                `.trim();

                return {
                    icon: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`,
                    iconSize: new Tmapv2.Size(48, 58)
                };
            }

            function getBuildingLabelIcon(label) {
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="62" height="26" viewBox="0 0 62 26">
                        <text x="31" y="17" text-anchor="middle" font-size="12" font-family="Arial, sans-serif" font-weight="700" fill="#262626">${label}</text>
                    </svg>
                `.trim();

                return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
            }

            function getBusMarkerIcon() {
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 42 42">
                        <circle cx="21" cy="21" r="19" fill="#2563eb" stroke="white" stroke-width="3"/>
                        <text x="21" y="27" text-anchor="middle" font-size="21" font-family="Arial, sans-serif">🚌</text>
                    </svg>
                `.trim();

                return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
            }

            function applyInitialCategory() {
                if (!INITIAL_MAP_CATEGORY) return;

                if (INITIAL_MAP_CATEGORY === "밥친구") {
                    document.getElementById("meal").checked = true;
                    return;
                }

                if (["분실물", "분실했어요", "습득했어요"].includes(INITIAL_MAP_CATEGORY)) {
                    document.getElementById("lost").checked = true;
                    if (INITIAL_MAP_CATEGORY !== "분실물") {
                        lostTypeSelect.value = INITIAL_MAP_CATEGORY;
                    }
                }
            }

            function updateLostTypeVisibility() {
                lostTypeBox.classList.toggle('hidden', getSelectedPinCategory() !== '분실물');
                const isMealPin = getSelectedPinCategory() === '밥친구';
                meetingTimeBox.classList.toggle('hidden', !isMealPin);
                meetingTimeInput.required = isMealPin;
                if (!isMealPin) {
                    meetingTimeInput.value = "";
                }
            }

            function updateTitlePrefixBadge() {
                const content = removeTitlePrefix(pinTitleInput.value);
                const prefix = getTitlePrefix();
                pinTitleInput.value = content;
                titlePrefixBadge.textContent = prefix;
                titlePrefixBadge.classList.toggle("d-none", !prefix);
            }

            function getPinSubmitError(formData) {
                const title = removeTitlePrefix(formData.get('title')).trim();
                const description = String(formData.get('description') || '').trim();

                if (!title) {
                    return '제목을 입력해 주세요';
                }

                if (!description) {
                    return '내용을 입력해 주세요';
                }

                if (getSelectedPinCategory() === '밥친구' && !formData.get('meetingTime')) {
                    return '밥친구 약속 시간을 선택해 주세요';
                }

                return '';
            }

            function getPinSaveErrorMessage(response) {
                if (response.status === 401 || response.status === 403) {
                    return '로그인 후 핀을 추가할 수 있어요';
                }

                if (response.status === 400) {
                    return '입력한 내용을 다시 확인해 주세요';
                }

                return '핀을 저장하지 못했어요. 잠시 후 다시 시도해 주세요';
            }

            function handlePinSubmit(e) {
                e.preventDefault();

                const formData = new FormData(this);
                const validationMessage = getPinSubmitError(formData);

                if (validationMessage) {
                    showToast(validationMessage);
                    return;
                }

                const title = removeTitlePrefix(formData.get('title')).trim();
                const prefix = getTitlePrefix();
                const selectedTag = getSelectedPinTag();

                formData.set('tag', selectedTag);
                if (["분실했어요", "습득했어요"].includes(selectedTag)) {
                    formData.set('category', selectedTag);
                }

                if (title && prefix) {
                    formData.set('title', `${prefix} ${title}`);
                } else {
                    formData.set('title', title);
                }

                fetch(PIN_ADD_URL, {
                    method: 'POST',
                    body: formData,
                })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(getPinSaveErrorMessage(response));
                        }
                        return response.json();
                    })
                    .then(pin => {
                        pin.tag = pin.tag || selectedTag;
                        savedPins.push(pin);
                        renderPins();

                        const currentFilter = getCurrentFilter();

                        if (currentFilter === 'all' || currentFilter === pin.category) {
                            showToast('게시글 핀 추가됨');
                        } else {
                            showToast('현재 필터에서는 보이지 않습니다');
                        }

                        pinModal.hide();
                        resetImageInput();
                    })
                    .catch(error => {
                        showToast(error.message || '핀을 저장하지 못했어요. 잠시 후 다시 시도해 주세요');
                    });
            }

            async function handleCommentSubmit(event) {
                event.preventDefault();

                if (!selectedDetailPin) return;

                if (!IS_AUTHENTICATED) {
                    showMapLoginPrompt();
                    return;
                }

                const content = detailCommentInput.value.trim();
                if (!content) {
                    showToast("댓글을 입력해 주세요");
                    return;
                }

                const formData = new FormData();
                formData.append("content", content);

                try {
                    const response = await fetch(`/mapPin/${selectedDetailPin.id}/comment/add`, {
                        method: "POST",
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(response.status === 401 ? "로그인 후 댓글을 작성할 수 있어요" : "댓글을 저장하지 못했어요");
                    }

                    detailCommentInput.value = "";
                    await loadPinComments(selectedDetailPin.id);
                } catch (error) {
                    showToast(error.message || "댓글을 저장하지 못했어요");
                }
            }

            async function deletePin(id) {
                if (!await showConfirmModal('핀을 삭제할까요?')) return;
                const formData = new FormData();
                formData.set('postId', id);

                if (detailDeleteBtn.dataset.csrfName && detailDeleteBtn.dataset.csrfValue) {
                    formData.set(detailDeleteBtn.dataset.csrfName, detailDeleteBtn.dataset.csrfValue);
                }

                fetch(detailDeleteBtn.dataset.deleteAction || '/post/delete', {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'
                })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('delete failed');
                        }

                        savedPins = savedPins.filter(p => p.id !== id);
                        renderPins();
                        closeDetail();
                        showToast('핀을 삭제했어요');
                    })
                    .catch(() => {
                        showToast('핀을 삭제하지 못했어요');
                    });
            }

            /* 이벤트 등록 */
            function setupEventListeners() {
                pinForm.addEventListener('submit', handlePinSubmit);
                detailCommentForm.addEventListener("submit", handleCommentSubmit);
                detailCloseBtn.addEventListener("click", closeDetail);
                mapLoginPromptClose.addEventListener("click", hideMapLoginPrompt);
                mapLoginPromptCancel.addEventListener("click", hideMapLoginPrompt);
                mapLoginPrompt.addEventListener("click", event => {
                    if (event.target === mapLoginPrompt) hideMapLoginPrompt();
                });

                document.addEventListener("keydown", event => {
                    if (event.key === "Escape" && !mapLoginPrompt.classList.contains("hidden")) {
                        hideMapLoginPrompt();
                    }
                });

                document.querySelectorAll('.filter-btn').forEach(button => {
                    button.addEventListener('click', () => applyFilter(button.dataset.type));
                });

                fileInput.addEventListener("change", () => handleImage(fileInput));
                cameraInput.addEventListener("change", () => handleImage(cameraInput));

                categoryRadios.forEach(radio => radio.addEventListener("change", () => {
                    updateLostTypeVisibility();
                    updateTitlePrefixBadge();
                }));

                lostTypeSelect.addEventListener("change", updateTitlePrefixBadge);
                pinTitleInput.addEventListener("input", updateTitlePrefixBadge);

                window.addEventListener('load', () => {
                    setTimeout(initTmap, 200);
                });
            }

            setupEventListeners();
            updateLostTypeVisibility();
            updateTitlePrefixBadge();
        </script>
