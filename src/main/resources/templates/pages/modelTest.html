    <form id="userForm">
        <label for="userId">아이디:</label>
        <input type="text" id="userId" name="userId" value="1" required><br>

        <label for="userName">이름:</label>
        <input type="text" id="userName" name="userName" value="1" required><br>

        <label for="userNumber">number:</label>
        <input type="text" id="userNumber" name="userNumber" value="123" required><br>

        <button type="submit">POST 전송</button>
    </form>

    <script>
        document.getElementById('userForm').addEventListener('submit', function(event) {
            // 1. 브라우저의 기본 폼 제출 동작(페이지 새로고침 및 form-data 전송) 차단
            event.preventDefault();

            // 2. 폼 내부의 입력 데이터를 객체 형태로 추출
            const formData = new FormData(this);
            const requestData = Object.fromEntries(formData.entries());

            // 3. fetch API를 사용하여 JSON 데이터 전송
            fetch('/test/model/user/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json' // 서버에 JSON 형식임을 명시
                },
                body: JSON.stringify(requestData)      // JS 객체를 JSON 문자열로 변환
            })
                .then(response => {
                    if (response.ok) {
                        // 성공 시 처리 로직 (예: 페이지 이동 또는 알림)
                        alert("전송 완료");
                    } else {
                        // 서버 에러 처리 로직
                        alert("전송 실패: " + response.status);
                    }
                })
                .catch(error => {
                    // 네트워크 에러 처리 로직
                    console.error("통신 에러:", error);
                });
        });
    </script>
