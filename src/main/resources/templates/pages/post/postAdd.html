<div th:replace="~{layout/layout :: layout(~{::content})}">
    <div th:fragment="content">
        <main class="mx-auto max-w-3xl px-4 py-8">
            <div class="mb-6">
                <a href="/post/list" class="text-sm font-semibold text-neutral-500 hover:text-neutral-950 hover:underline dark:text-neutral-300 dark:hover:text-white">
                    게시판으로 돌아가기
                </a>
                <h1 class="mt-3 text-2xl font-bold text-neutral-950 dark:text-neutral-100">새 게시글 작성</h1>
                <p class="mt-2 text-sm text-neutral-500 dark:text-neutral-300">
                    카테고리를 고르고 캠퍼스 생활에 필요한 내용을 자유롭게 남겨주세요.
                </p>
            </div>

            <form th:action="@{/post/add}"
                  method="post"
                  enctype="multipart/form-data"
                  class="space-y-5 border border-neutral-200 bg-white p-5 dark:border-neutral-700 dark:bg-neutral-800">
                <div>
                    <label for="category" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">
                        카테고리
                    </label>
                    <select id="category"
                            name="category"
                            class="w-full border border-neutral-200 bg-white px-3 py-2 text-sm text-neutral-950 focus:outline-none focus:ring-2 focus:ring-neutral-300 dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100"
                            required>
                        <option value="">카테고리 선택</option>
                        <option th:each="cat : ${categoryList}"
                                th:value="${cat.categoryName}"
                                th:text="${cat.categoryName}">
                        </option>
                    </select>
                </div>

                <div>
                    <label for="title" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">
                        제목
                    </label>
                    <input id="title"
                           type="text"
                           name="title"
                           placeholder="제목을 입력하세요"
                           class="w-full border border-neutral-200 bg-white px-3 py-2 text-sm text-neutral-950 focus:outline-none focus:ring-2 focus:ring-neutral-300 dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100"
                           required>
                </div>

                <div>
                    <label for="content" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">
                        내용
                    </label>
                    <textarea id="content"
                              name="content"
                              rows="10"
                              placeholder="내용을 입력하세요"
                              class="w-full resize-y border border-neutral-200 bg-white px-3 py-2 text-sm leading-6 text-neutral-950 focus:outline-none focus:ring-2 focus:ring-neutral-300 dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100"
                              required></textarea>
                </div>

                <div>
                    <label for="image" class="mb-1 block text-sm font-semibold text-neutral-700 dark:text-neutral-200">
                        이미지 첨부
                    </label>
                    <input id="image"
                           type="file"
                           name="image"
                           multiple
                           class="w-full border border-neutral-200 bg-white px-3 py-2 text-sm text-neutral-700 file:mr-3 file:border-0 file:bg-neutral-950 file:px-3 file:py-1.5 file:text-sm file:font-semibold file:text-white dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-100">
                    <p class="mt-1 text-xs text-neutral-500 dark:text-neutral-400">
                        여러 장을 선택할 수 있습니다.
                    </p>
                </div>

                <input type="hidden" name="userId" value="22">

                <div class="flex justify-end gap-2 border-t border-neutral-200 pt-4 dark:border-neutral-700">
                    <a href="/post/list"
                       class="px-4 py-2 text-sm font-semibold text-neutral-600 hover:bg-neutral-100 dark:text-neutral-200 dark:hover:bg-neutral-700">
                        취소
                    </a>
                    <button type="submit"
                            class="px-5 py-2 text-sm font-semibold text-white bg-neutral-950 hover:bg-neutral-800">
                        등록
                    </button>
                </div>
            </form>
        </main>
    </div>
</div>
