<div th:replace="~{layout/layout :: layout(~{::content})}"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

  <div th:fragment="content">
    <main>
      <div class="max-w-3xl w-full mx-auto px-4 py-6">

        <!-- 뒤로가기 -->
        <a href="/post/list" class="text-sm text-neutral-500 hover:underline mb-4 inline-block">
          ← 목록으로
        </a>

        <!-- 게시글 -->
        <div id="postDetail" class="border rounded-xl p-5">
          <!-- categoli -->
          <div class="mb-3">
            <span th:text="${post.category.categoryName}"
                  class="text-xs px-2 py-1 bg-neutral-200 rounded">
            </span>
          </div>

          <!-- title -->
          <h1 th:text="${post.title}"
              class="text-xl font-bold mb-2">
          </h1>

          <!-- meta -->
          <div class="text-sm text-neutral-400 mb-4 flex gap-3">
            <span th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
            <span>댓글 <span th:text="${#lists.size(commentList)}"></span></span>
            <span th:text="${post.user.userId}"></span>
          </div>

          <div th:if="${isOwner}" class="mb-4 flex justify-end gap-2 border-y border-neutral-200 py-3 dark:border-neutral-700">
            <a th:href="@{/post/edit/{id}(id=${post.id})}"
               class="inline-flex h-9 items-center justify-center rounded-full border border-neutral-300 px-4 text-sm font-semibold text-neutral-700 transition hover:bg-neutral-100 dark:border-neutral-600 dark:text-neutral-100 dark:hover:bg-neutral-800">
              수정
            </a>
            <form th:action="@{/post/delete}" method="post" onsubmit="return confirm('게시글을 삭제할까요?');" class="m-0">
              <input type="hidden" name="postId" th:value="${post.id}">
              <button type="submit"
                      class="inline-flex h-9 items-center justify-center rounded-full border border-red-200 bg-red-50 px-4 text-sm font-semibold text-red-600 transition hover:bg-red-100 dark:border-red-900 dark:bg-red-950 dark:text-red-300 dark:hover:bg-red-900">
                삭제
              </button>
            </form>
          </div>

          <!-- content -->
          <div th:text="${post.content}"
               class="text-sm leading-relaxed whitespace-pre-line">
          </div>

          <div class="flex gap-2 overflow-x-auto mt-2 snap-x snap-mandatory">
            <div th:each="img : ${post.images}" class="flex-shrink-0 snap-start">
              <img th:src="@{${img.imageUrl}}"
                   class="object-cover rounded-lg border"
                   style="width: 220px; height: 220px; max-width: 100%;"/>
            </div>
          </div>

          <section th:if="${post.lat != null and post.lon != null}"
                   class="mt-5 border-t pt-4">
            <div class="mb-2 flex items-center justify-between gap-3">
              <h2 class="text-sm font-semibold">대략적인 위치</h2>
              <span class="text-xs text-neutral-400"
                    th:text="|${post.lat}, ${post.lon}|"></span>
            </div>
            <div id="postLocationMap"
                 class="border bg-neutral-100"
                 th:data-lat="${post.lat}"
                 th:data-lon="${post.lon}"
                 th:data-title="${post.title}"
                 style="width: 50%; height: 240px; min-width: 280px; max-width: 100%; border-radius: 8px;"></div>
          </section>
        </div>

        <!-- 댓글 -->
        <section class="mt-6">
          <h2 class="text-sm font-semibold mb-3">
            댓글 <span th:text="${#lists.size(commentList)}"></span>
          </h2>

          <div class="space-y-3">
            <p th:if="${commentList == null or #lists.isEmpty(commentList)}"
               class="text-sm text-neutral-500">
              아직 댓글이 없습니다.
            </p>

            <div th:each="comment : ${commentList}" class="border-t pt-3">
              <div class="flex gap-2 text-xs text-neutral-400 mb-1">
                <span th:text="${comment.user.userName}"></span>
                <span th:text="${#temporals.format(comment.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
              </div>
              <p th:text="${comment.content}" class="text-sm whitespace-pre-line"></p>
            </div>
          </div>

          <form sec:authorize="isAuthenticated()"
                th:action="@{/post/{postId}/comment/add(postId=${post.id})}"
                method="post"
                class="mt-4 flex gap-2">
            <input type="text"
                   name="content"
                   required
                   minlength="1"
                   class="flex-1 border rounded px-3 py-2 text-sm"
                   placeholder="댓글을 입력하세요">
            <button type="submit"
                    class="px-3 py-2 text-sm text-white bg-neutral-900 rounded">
              등록
            </button>
          </form>

          <div sec:authorize="isAnonymous()" class="mt-4 text-sm text-neutral-500">
            <a href="/login" class="underline">로그인</a> 후 댓글을 작성할 수 있습니다.
          </div>
        </section>
      </div>

      <script th:if="${post.lat != null and post.lon != null}">
        (() => {
          let initialized = false;

          function renderPostLocationMap() {
            if (initialized || !window.Tmapv2) return false;

            const mapElement = document.getElementById("postLocationMap");
            if (!mapElement) return false;

            const postLat = Number(mapElement.dataset.lat);
            const postLon = Number(mapElement.dataset.lon);
            if (!Number.isFinite(postLat) || !Number.isFinite(postLon)) return false;

            const center = new Tmapv2.LatLng(postLat, postLon);
            const map = new Tmapv2.Map("postLocationMap", {
              center,
              width: "100%",
              height: "240px",
              zoom: 16
            });

            new Tmapv2.Marker({
              position: center,
              title: mapElement.dataset.title || "게시글 위치",
              map
            });

            initialized = true;
            return true;
          }

          window.initPostLocationMap = function () {
            let count = 0;
            const timer = setInterval(() => {
              count += 1;
              if (renderPostLocationMap() || count >= 20) {
                clearInterval(timer);
              }
            }, 150);
          };

          window.addEventListener("load", window.initPostLocationMap);
        })();
      </script>
      <script th:if="${post.lat != null and post.lon != null}"
              src="https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey=xuA0v0EToS2lTlJCTmm2d6cUkKnihnZA8UO140xt"
              onload="window.initPostLocationMap && window.initPostLocationMap()"></script>
      </script>
      <script>
        // URL에서 id 가져오기

        const postId = Number(params.get("id"));

        const posts = JSON.parse(localStorage.getItem("posts") || "[]");
        const post = posts.find(p => p.id === postId);

    </main>
