<div th:replace="~{layout/layout :: layout(~{::content})}">

    <div th:fragment="content">
        <!-- MAIN START -->
        <!--        <div class="relative max-w-[1200px] m-auto bg-white rounded-2xl shadow p-4 overflow-x-auto ">-->

        <div class="relative max-w-[1200px] m-auto bg-white rounded-2xl shadow p-4 overflow-x-auto dark:bg-neutral-800 dark:border-neutral-700">
            <div>
                <!-- 추가 버튼 -->
                <button onclick="openAddModal()"
                        class="mb-4 px-4 py-2 bg-gray-700 text-white rounded">
                    + 수업 추가
                </button>

                <!-- 수업 수정/추가 모달 -->
                <div id="modal"
                     class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">

                    <div class="bg-white dark:bg-neutral-800 p-6 rounded-xl w-80 shadow-lg">
                        <h2 id="modal-title" class="text-lg font-bold mb-4">수업 추가</h2>

                        <form method="post" th:action="@{/timetable/add}">

                            <input type="hidden" name="id" id="form-id">

                            <input name="title" id="form-title" type="text" placeholder="과목명"
                                   class="w-full mb-2 p-2 border rounded" required>

                            <!-- 슬롯 컨테이너 -->
                            <div id="time-slot-container"></div>

                            <!-- 시간 추가 버튼 -->
                            <button type="button" onclick="addTimeSlot()"
                                    class="mb-4 px-3 py-1 bg-gray-300 rounded">
                                + 시간 추가
                            </button>

                            <div class="flex justify-end gap-2">
                                <button type="button" onclick="closeModal()"
                                        class="px-3 py-1 border rounded">
                                    취소
                                </button>
                                <button type="submit"
                                        class="px-3 py-1 bg-blue-500 text-white rounded">
                                    저장
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 수업 삭제 히든 폼 -->
                <form id="delete-form" method="post" th:action="@{/timetable/delete}">
                    <input type="hidden" name="id" id="delete-id">
                </form>
            </div>
            <div class="relative">

                <!-- 시간표 그리드 -->
                <div id="timetable"
                     class="grid relative border-bg-white border-gray-200 dark:bg-neutral-800 dark:border-neutral-700"
                     style="grid-template-columns: 60px repeat(5, 1fr);
                            grid-template-rows: 32px repeat(9, 80px);">

                    <!-- 헤더 -->
                    <div class="flex border h-8 items-center justify-center">시간</div>
                    <div class="flex border h-8 items-center justify-center">월</div>
                    <div class="flex border h-8 items-center justify-center">화</div>
                    <div class="flex border h-8 items-center justify-center">수</div>
                    <div class="flex border h-8 items-center justify-center">목</div>
                    <div class="flex border h-8 items-center justify-center">금</div>

                    <!-- 시간 rows -->
                    <th:block th:each="time : ${#numbers.sequence(9, 17)}">
                        <div class="flex border items-center justify-center"
                             th:text="${time}"></div>

                        <th:block th:each="i : ${#numbers.sequence(1,5)}">
                            <div class="border"></div>
                        </th:block>
                    </th:block>
                </div>

                <!-- 수업 그리드 -->
                <div class="grid absolute top-0 left-0 w-full h-full"
                     style="grid-template-columns: 60px repeat(5, 1fr);
                            grid-template-rows: 32px repeat(9, 80px);">
                    <th:block th:each="item : ${timeTable}">
                        <th:block th:each="slot : ${item.timeSlotModels}">

                            <div class="subject relative border rounded p-2 text-sm z-10"
                                 th:data-id="${item.id}"
                                 th:data-title="${item.title}"

                                 th:style="|
                                    grid-column: ${slot.day + 1};
                                    grid-row: ${(slot.startTime - 9) + 2} / ${(slot.endTime - 9) + 2};
                                    background-color: ${item.color};
                            |">
                                <!-- 슬롯 데이터를 숨겨서 넣기 -->
                                <div class="hidden slots-data">
                                    <div th:each="slot : ${item.timeSlotModels}"
                                         th:data-day="${slot.day}"
                                         th:data-start="${slot.startTime}"
                                         th:data-end="${slot.endTime}"
                                         th:data-place="${slot.place}">
                                    </div>
                                </div>

                                <div th:text="${item.title}"></div>
                                <div th:text="${slot.place}"></div>

                                <div class="absolute bottom-1 right-1 flex gap-1">
                                    <button type="button" onclick="handleEdit(this)"
                                            class="text-xs px-2 py-1 bg-blue-500 text-white rounded edit-btn">
                                        수정
                                    </button>
                                    <button type="button" onclick="deleteClass(this)"
                                            class="text-xs px-2 py-1 bg-red-500 text-white rounded">
                                        삭제
                                    </button>
                                </div>
                            </div>

                        </th:block>
                    </th:block>

                </div>
            </div>
        </div>

        <script>
            let slotIndex = 0;

            function openModal() {
                document.getElementById("modal").classList.remove("hidden");
            }

            function closeModal() {
                document.getElementById("modal").classList.add("hidden");
            }

            function resetForm() {
                document.getElementById("form-id").value = "";
                document.getElementById("form-title").value = "";

                const container = document.getElementById("time-slot-container");
                container.innerHTML = "";

                slotIndex = 0;
            }

            function handleEdit(btn) {
                const subject = btn.closest(".subject");

                const slots = [];

                subject.querySelectorAll(".slots-data > div").forEach(el => {
                    slots.push({
                        day: el.dataset.day,
                        startTime: el.dataset.start,
                        endTime: el.dataset.end,
                        place: el.dataset.place || ""
                    });
                });

                const data = {
                    id: subject.dataset.id,
                    title: subject.dataset.title,
                    slots: slots
                };

                openEditModal(data);
            }

            function openAddModal() {
                document.getElementById("modal-title").innerText = "수업 추가";

                resetForm();
                addTimeSlot();

                openModal();
            }

            function openEditModal(data) {
                // 초기화
                resetForm();
                document.getElementById("modal-title").innerText = "수업 수정";

                // 기본 정보
                document.getElementById("form-id").value = data.id;
                document.getElementById("form-title").value = data.title;

                const container = document.getElementById("time-slot-container");

                // 슬롯 채우기
                data.slots.forEach(slot => {
                    addTimeSlot();

                    const currentSlot = container.lastElementChild;

                    setSelectValue(currentSlot.querySelector('[name*="day"]'), slot.day, slot.day + "요일");
                    setSelectValue(currentSlot.querySelector('[name*="startTime"]'), slot.startTime, slot.startTime + "시");
                    setSelectValue(currentSlot.querySelector('[name*="endTime"]'), slot.endTime, slot.endTime + "시");
                    currentSlot.querySelector('[name*="place"]').value = slot.place;
                });

                openModal();
            }

            function setSelectValue(select, value, label) {
                const stringValue = String(value ?? "");
                if (!stringValue) return;

                const hasOption = [...select.options].some(option => option.value === stringValue);
                if (!hasOption) {
                    select.add(new Option(label, stringValue));
                }

                select.value = stringValue;
            }

            function addTimeSlot() {
                const container = document.getElementById("time-slot-container");

                const html = `
                    <div class="slot-item mb-3 relative">

                        <div class="flex gap-2 mb-2">
                            <select name="timeSlots[${slotIndex}].day" class="flex-1 p-2 border rounded" required>
                                <option value="" disabled selected hidden>요일</option>
                                <option value="1">월</option>
                                <option value="2">화</option>
                                <option value="3">수</option>
                                <option value="4">목</option>
                                <option value="5">금</option>
                            </select>

                            <select name="timeSlots[${slotIndex}].startTime" class="flex-1 p-2 border rounded" required>
                                <option value="" disabled selected hidden>시작</option>
                                ${generateTimeOptions()}
                            </select>

                            <select name="timeSlots[${slotIndex}].endTime" class="flex-1 p-2 border rounded" required>
                                <option value="" disabled selected hidden>종료</option>
                                ${generateTimeOptions()}
                            </select>
                        </div>

                        <div class="flex gap-2 mb-2">
                            <input name="timeSlots[${slotIndex}].place"
                                   type="text"
                                   placeholder="수업장소"
                                   class="flex-1 p-2 border rounded">
                            <button type="button"
                                    onclick="removeSlot(this)"
                                    class="text-xs px-2 py-1 bg-red-400 text-white rounded">
                                ✕
                            </button>
                        </div>
                    </div>
                `;

                container.insertAdjacentHTML("beforeend", html);
                slotIndex++;
            }

            // 시간 옵션 생성 함수
            function generateTimeOptions() {
                let options = "";
                for (let i = 9; i <= 18; i++) {
                options += `<option value="${i}">${i}시</option>`;
            }
                return options;
            }

            function removeSlot(btn) {
                const slot = btn.closest(".slot-item");

                const container = document.getElementById("time-slot-container");

                // 슬롯이 1개면 초기화
                if (container.children.length === 1) {
                    slot.remove();
                    resetForm();
                    addTimeSlot();
                    return;
                }

                slot.remove();

                reindexSlots();
            }

            function reindexSlots() {
                const slots = document.querySelectorAll(".slot-item");

                slots.forEach((slot, index) => {
                    const day = slot.querySelector('[name*="day"]');
                    const start = slot.querySelector('[name*="startTime"]');
                    const end = slot.querySelector('[name*="endTime"]');
                    const place = slot.querySelector('[name*="place"]');

                    day.name = `timeSlots[${index}].day`;
                    start.name = `timeSlots[${index}].startTime`;
                    end.name = `timeSlots[${index}].endTime`;
                    place.name = `timeSlots[${index}].place`;
                });

                // 다음 추가 index 맞추기
                slotIndex = slots.length;
            }

            function deleteClass(btn) {
                const subject = btn.closest(".subject");
                const id = subject.dataset.id;

                const confirmed = confirm(
                    "이 수업 전체를 삭제하시겠습니까?\n(부분 삭제는 수정에서 가능합니다.)"
                );

                if (!confirmed) return;

                document.getElementById("delete-id").value = id;
                document.getElementById("delete-form").submit();
            }
        </script>
    </div>
</div>
