<div th:replace="~{layout/layout :: layout(~{::content})}">

    <div th:fragment="content">
        <h2>회원가입</h2>
        <form th:action="@{/user/add}" th:object="${userSaveRequestDto}" method="post">
            <div>
                <label for="userId">아이디</label>
                <input type="text" id="userId" th:field="*{userId}" required>
                <p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></p>
            </div>
            <div>
                <label for="userName">이름</label>
                <input type="text" id="userName" th:field="*{userName}" required>
                <p th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></p>
            </div>
            <div>
                <label for="userNumber">학번</label>
                <input type="text" id="userNumber" th:field="*{userNumber}" required>
                <p th:if="${#fields.hasErrors('userNumber')}" th:errors="*{userNumber}"></p>
            </div>
            <div>
                <label for="gender">성별</label>
                <select id="gender" th:field="*{gender}">
                    <option value="">선택 안 함</option>
                    <option value="남성">남성</option>
                    <option value="여성">여성</option>
                </select>
            </div>
            <div>
                <label for="passwd">비밀번호</label>
                <input type="password" id="passwd" th:field="*{passwd}" required>
                <p th:if="${#fields.hasErrors('passwd')}" th:errors="*{passwd}"></p>
            </div>
            <button type="submit">가입하기</button>
        </form>
    </div>

</div>
