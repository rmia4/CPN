<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; }
        .post-box { border: 1px solid #333; padding: 15px; margin-bottom: 20px; }
        .comment-box { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; background-color: #f9f9f9; }
        .comment-form { margin-top: 15px; }
    </style>
</head>
<body>

<div class="post-box">
    <h2 th:text="${post.title}">게시글 제목</h2>
    <p th:text="${post.content}">게시글 내용</p>

    <form th:action="@{/test/model/post/delete/{id}(id=${post.id})}" method="post" style="text-align: right;">

        <button type="submit" style="color: red;">게시글 삭제</button>
    </form>
</div>

<hr>

<h3>댓글</h3>

<div th:each="comment : ${commentList}" class="comment-box">
    <span th:text="${comment.content}">댓글 내용</span>

    <form th:action="@{/test/model/comment/delete/{id}(id=${comment.id})}" method="post" style="display:inline; float:right;">
        <input type="hidden" name="postId" th:value="${post.id}">
        <button type="submit">삭제</button>
    </form>
    <div style="clear:both;"></div>
</div>

<div class="comment-form">
    <form th:action="@{/test/model/comment/add/{postId}(postId=${post.id})}" method="post">
        <input type="text" name="content" placeholder="댓글을 입력하세요" required style="width: 70%;">

        <button type="submit">댓글 작성</button>
    </form>
</div>

<br><br>

</body>
</html>
