<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; }
        .form-box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
        .post-item { margin-bottom: 10px; }
    </style>
</head>
<body>

<h2>새 게시글 작성</h2>
<div class="form-box">
    <form th:action="@{/test/postTest/add}" method="post">
        <div style="margin-bottom: 10px;">
            <input type="text" name="title" placeholder="게시글 제목" required style="width: 100%;">
        </div>
        <div style="margin-bottom: 10px;">
            <textarea name="content" placeholder="게시글 내용" required style="width: 100%; height: 80px;"></textarea>
        </div>
        <button type="submit">작성</button>
    </form>
</div>

<hr>

<h2>게시글 목록</h2>
<ul>
    <li th:each="post : ${postList}" class="post-item">
        <a th:href="@{/test/postTest/detail/{id}(id=${post.id})}" th:text="${post.title}">게시글 제목</a>
    </li>
</ul>

</body>
</html>
